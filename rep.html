    <style>
        body {
            background-color: #f8fafc;
            /* Professional Slate-50 */
            color: #0f172a;
            /* Slate-900 */
            font-family: 'Cairo', sans-serif;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.03) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.03) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Premium Card Style */
        .glass {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            border-radius: 1.25rem;
            transition: all 0.3s ease;
        }

        .dark .glass {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* High Visibility Status Badges */
        .badge-solid {
            padding: 0.4rem 0.8rem;
            border-radius: 0.75rem;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 0.025em;
        }

        @keyframes repDateFilterGlow {

            0%,
            100% {
                border-color: #e2e8f0;
            }

            50% {
                border-color: #6366f1;
                box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            }
        }

        .rep-date-filter-glow {
            animation: repDateFilterGlow 2.5s ease-in-out infinite;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        .text-main {
            color: #0f172a;
            font-weight: 800;
        }

        .text-sub {
            color: #64748b;
            font-weight: 600;
        }

        .shipment-swipe-card {
            touch-action: pan-y;
            will-change: transform;
        }

</head>

    <script src="js/config.js"></script>
    <script src="js/tracking.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const SHIPMENT_PRICE_FIELD = 'السعر بعد التعديل';
        const SHIPMENT_PRICE_FIELD_LEGACY = 'السعر_بعد_التعديل';
        const SHIPMENT_CODE_FIELD = 'كود الشحنة';
        const SHIPMENT_CODE_FIELD_LEGACY = 'order_id';

        let trackingSystem = null;

        function updateTrackingUI() {
            const btn = document.getElementById('trackingToggleBtn');
            const icon = document.getElementById('trackingIcon');
            if(trackingSystem && trackingSystem.isTracking) {
                btn.classList.replace('text-slate-400', 'text-emerald-500');
                icon.classList.add('animate-pulse');
            } else {
                btn.classList.replace('text-emerald-500', 'text-slate-400');
                icon.classList.remove('animate-pulse');
            }
        }

        function toggleTracking() {
            if(!trackingSystem) return;
            const isNowActive = trackingSystem.toggleShift();
            updateTrackingUI();
            
            if (isNowActive) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'تم بدء الشيفت - جاري تتبع الموقع',
                    showConfirmButton: false,
                    timer: 3000
                });
            }
        }

        function normalizeShipmentPriceField(record) {
            return normalizeShipmentRecordHeaders(record);
        }

        function toServerShipmentPayload(payload) {
            return buildShipmentServerPayload(payload);
        }

        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || (user.role !== 'rep' && user.role !== 'مندوب فرعي')) {
            window.location.href = 'index.html';
        }
        startStoredUserSessionGuard(supabaseClient, {
            allowedRoles: ['rep', 'مندوب فرعي'],
            onValidUser: (latestUser) => {
                user = latestUser;
                const repName = document.getElementById('repName');
                if (repName) repName.innerText = latestUser.full_name || latestUser.username || latestUser.phone;
                
                const repRoleLabel = document.getElementById('repRoleLabel');
                if (repRoleLabel) {
                    repRoleLabel.innerText = latestUser.role === 'مندوب فرعي' ? 'مندوب فرعي' : 'مندوب توصيل محترف';
                }
                
                if(!trackingSystem) {
                    trackingSystem = new RepTrackingSystem(supabaseClient, latestUser);
                    if (!trackingSystem.isTracking) {
                        trackingSystem.startTracking();
                    }
                    updateTrackingUI();
                }
            }
        });

        document.getElementById('repName').innerText = user.full_name || user.username || user.phone;
        const initialRoleLabel = document.getElementById('repRoleLabel');
        if (initialRoleLabel) {
            initialRoleLabel.innerText = user.role === 'مندوب فرعي' ? 'مندوب فرعي' : 'مندوب توصيل محترف';
        }

        let allShipments = [];
        let selectedShipmentIdsForBulk = new Set();
        let activeShipmentMenuId = null;
        let lockedShipmentIds = new Set();
        const REP_UI_STATE_KEY = 'repUiState';
        const REP_SEEN_SHIPMENTS_KEY_PREFIX = 'repSeenShipments:';
        const REP_UNREAD_SESSION_KEY = 'repUnreadShipments:';
        const REP_NOTIFICATIONS_KEY = 'rep_local_notifications';
        const REP_FAVORITES_KEY_PREFIX = 'repFavoriteShipments:';
        
        let repNotifications = JSON.parse(localStorage.getItem(REP_NOTIFICATIONS_KEY) || '[]');
        let currentActiveView = 'dashboard';
        let favoriteShipmentIds = new Set();
        let shipmentSwipeState = null;
        let suppressShipmentClickUntil = 0;
        let isNotificationsPanelOpen = false;
        let shipmentsDataVersion = 0;
        let searchRenderTimer = null;

        function addRepNotification(type, shipment) {
            const notif = {
                id: Date.now() + Math.random(),
                type: type, // 'added', 'removed', 'deleted', 'status_changed'
                order_id: shipment.order_id || shipment.كود_الشحنة || shipment.الكود || '---',
                client: shipment.اسم_العميل || '---',
                employee: shipment['اسم الموظف'] || '---',
                newStatus: shipment.الحالة || '---',
                isWarehouse: normalizeComparableValue(shipment.المندوب) === normalizeComparableValue('مخزن'),
                time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }),
                date: new Date().toLocaleDateString('ar-EG'),
                read: false
            };
            repNotifications.unshift(notif);
            if (repNotifications.length > 50) repNotifications.pop();
            localStorage.setItem(REP_NOTIFICATIONS_KEY, JSON.stringify(repNotifications));
            updateRepNotifUI();
        }

        function invalidateShipmentRenderCache() {
            lastFilterSignature = '';
            lastMetaSignature = '';
            cachedFilteredShipments = [];
            cachedScopedShipments = [];
        }

        function bumpShipmentsDataVersion() {
            shipmentsDataVersion += 1;
            invalidateShipmentRenderCache();
        }

        function updateRepNotifUI() {
            const unreadCount = repNotifications.filter(n => !n.read).length;
            const badge = document.getElementById('low-unread-badge');
            if (badge) {
                badge.innerText = unreadCount;
                badge.classList.toggle('hidden', unreadCount === 0);
                badge.classList.toggle('flex', unreadCount > 0);
            }
            if (isNotificationsPanelOpen) renderRepNotifications();
        }

        function setNotificationsButtonActive(active) {
            const notifBtn = document.getElementById('nav-btn-notifications');
            if (!notifBtn) return;
            notifBtn.classList.toggle('text-indigo-600', active);
            notifBtn.classList.toggle('text-slate-400', !active);
        }

        function markAllRepNotificationsAsRead() {

            if (!card) return;

            card.style.transform = 'translateX(0px)';
            card.style.background = '';
        }

        function applyShipmentSwipeVisual(card, deltaX) {
            if (!card) return;
            const limitedX = Math.max(-120, Math.min(120, deltaX));
            const progress = Math.min(Math.abs(limitedX) / 120, 1);
            card.style.transition = 'none';
            card.style.transform = `translateX(${limitedX}px)`;

            if (limitedX > 0) {
                card.style.background = `linear-gradient(90deg, rgba(16,185,129,${0.18 + progress * 0.18}) 0%, rgba(255,255,255,0) 65%)`;
            } else if (limitedX < 0) {
                card.style.background = `linear-gradient(270deg, rgba(245,158,11,${0.18 + progress * 0.18}) 0%, rgba(255,255,255,0) 65%)`;
            } else {
                card.style.background = '';
            }
        }

            const result = await Swal.fire({
                title: 'إجراء سريع',
                text: 'اختر الإجراء المناسب لهذه الشحنة',
                icon: 'question',
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: 'مؤجل',
                denyButtonText: 'رفض',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#f59e0b',
                denyButtonColor: '#e11d48',
                customClass: {
                    popup: 'rounded-2xl shadow-2xl'
                }
            });

            if (result.isConfirmed) {
                await updateStatus(shipmentId, 'مؤجل');
            } else if (result.isDenied) {
                await handleRejectAction(shipmentId);
            }
        }

        function restoreRepUiState() {
            let state = null;
            try {
                state = JSON.parse(localStorage.getItem(REP_UI_STATE_KEY) || 'null');
            } catch (error) { }

            if (state && state.date) {
                const dates = Array.isArray(state.date) ? state.date : [state.date];

            } else {
                const legacyDate = getSavedDateFilter();
                const normalizedLegacyDate = String(legacyDate || '').trim();
                if (normalizedLegacyDate) dateFilterSelections.add(normalizedLegacyDate);
            }

            if (state && state.status) {

                statusFilterSelections.clear();

        function normalizeComparableValue(value) {

        }

        function getShipmentClientIdentity(shipment) {
            const primaryPhone = normalizeComparableValue(shipment?.الهاتف || shipment?.['رقم الهاتف'] || '');
            const secondaryPhone = normalizeComparableValue(shipment?.['هاتف_بديل'] || shipment?.هاتف_بديل || '');
            const clientName = normalizeComparableValue(shipment?.اسم_العميل || shipment?.['اسم العميل'] || '');
            return primaryPhone || secondaryPhone || clientName || '';
        }

        function buildClientShipmentFrequencyMap(shipments) {
            const frequencyMap = new Map();
            (shipments || []).forEach((shipment) => {
                const identity = getShipmentClientIdentity(shipment);
                if (!identity) return;
                frequencyMap.set(identity, (frequencyMap.get(identity) || 0) + 1);
            });
            return frequencyMap;
        }

        function getShipmentImportantNote(shipment) {
            const explicitNote = normalizeComparableValue(shipment?.ملاحظات || shipment?.['ملاحظات'] || shipment?.notes || '');
            if (explicitNote) return explicitNote;

            const reason = normalizeComparableValue(shipment?.['سبب الحالة'] || shipment?.سبب_الحالة || '');
            if (!reason) return '';

            const genericReasons = new Set(['مؤجل', 'رفض', 'الغاء', 'إلغاء', 'تم', 'تم التسليم', 'تعديل سعر', 'شحن']);
            return genericReasons.has(reason) ? '' : reason;
        }

        function getCachedShipmentCoordinates(shipment) {
            const directLat = Number(shipment?.lat ?? shipment?.latitude ?? shipment?.['خط العرض']);
            const directLng = Number(shipment?.lng ?? shipment?.longitude ?? shipment?.['خط الطول']);
            if (!Number.isNaN(directLat) && !Number.isNaN(directLng) && directLat && directLng) {
                return { lat: directLat, lng: directLng };
            }

            const addressCandidates = [
                `${shipment?.العنوان || ''} ${shipment?.الزون || ''}`.trim(),
                String(shipment?.العنوان || '').trim()
            ].filter(Boolean);

            for (const candidate of addressCandidates) {
                const normalized = candidate.replace(/[^a-zA-Z0-9\u0600-\u06FF\s]/g, ' ').trim();
                if (!normalized || normalized.length < 3) continue;
                const cacheKey = `geocode_${normalized}`;
                const cached = localStorage.getItem(cacheKey);
                if (!cached) continue;
                try {
                    const parsed = JSON.parse(cached);
                    const lat = Number(parsed?.lat);
                    const lng = Number(parsed?.lng);
                    if (!Number.isNaN(lat) && !Number.isNaN(lng)) {
                        return { lat, lng };
                    }
                } catch (error) { }
            }

            return null;
        }

        function getShipmentDistanceBadge(shipment) {
            const repLat = trackingSystem?.lastReportedLocation?.latitude;
            const repLng = trackingSystem?.lastReportedLocation?.longitude;
            if (typeof repLat !== 'number' || typeof repLng !== 'number') return null;

            const destination = getCachedShipmentCoordinates(shipment);
            if (!destination) return null;

            const distanceCalculator = typeof trackingSystem?.calculateDistance === 'function'
                ? trackingSystem.calculateDistance.bind(trackingSystem)
                : null;
            if (!distanceCalculator) return null;

            const distanceMeters = distanceCalculator(repLat, repLng, destination.lat, destination.lng);
            if (!Number.isFinite(distanceMeters)) return null;

            if (distanceMeters <= 800) {
                return { label: 'قريب', className: 'bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800' };
            }
            if (distanceMeters <= 2500) {
                return { label: 'بالقرب', className: 'bg-sky-50 dark:bg-sky-950/30 text-sky-700 dark:text-sky-300 border-sky-200 dark:border-sky-800' };
            }
            return null;
        }

        function playNotificationSound() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;

                if (!notificationAudioContext) {
                    notificationAudioContext = new AudioContextClass();
                }

                if (notificationAudioContext.state === 'suspended') {
                    notificationAudioContext.resume().catch(() => { });
                }

                const now = notificationAudioContext.currentTime;
                const gain = notificationAudioContext.createGain();
                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(0.15, now + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
                gain.connect(notificationAudioContext.destination);

                [880, 1320].forEach((freq, index) => {
                    const osc = notificationAudioContext.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.12);
                    osc.connect(gain);
                    osc.start(now + index * 0.12);
                    osc.stop(now + 0.18 + index * 0.12);
                });
            } catch (error) { }
        }

        function enableAudioOnInteraction() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            if (!notificationAudioContext) {

                } catch (error) { }
            }
            if (notificationAudioContext && notificationAudioContext.state === 'suspended') {
                notificationAudioContext.resume().catch(() => { });
            }
        }

            setUnreadBadge(unreadIds.size);
            playNotificationSound();

                .filter(Boolean)
                .slice(0, 3);
            const extra = count > codes.length ? ` و${count - codes.length} أخرى` : '';
            const body = codes.length
                ? `تم تنزيل ${count} شحنة جديدة عليك: ${codes.join('، ')}${extra}`
                : `تم تنزيل ${count} شحنة جديدة عليك`;

            Swal.fire({
                toast: true,
                position: 'top-start',
                icon: 'success',
                title: 'شحنات جديدة',
                text: body,
                showConfirmButton: false,
                timer: 5000,
                timerProgressBar: true
            });

            if ('Notification' in window && Notification.permission === 'granted') {
                try {
                    new Notification('شحنات جديدة للمندوب', {
                        body,
                        dir: 'rtl'
                    });
                } catch (error) { }
            }
        }

        function getShipmentUpdateValue(shipment) {
            const directValue = shipment?.['اليومية'] ?? shipment?.اليومية ?? shipment?.['اليوميه'];
            if (directValue !== null && directValue !== undefined) {
                const normalized = String(directValue).trim();
                if (normalized) return normalized;
            }

            if (!shipment || typeof shipment !== 'object') return '';
            const fallbackKey = Object.keys(shipment).find((key) => {
                const normalizedKey = String(key || '').replace(/\s+/g, '').trim();
                return normalizedKey === 'اليومية' || normalizedKey === 'اليوميه';
            });
            if (!fallbackKey) return '';

            const fallbackValue = shipment[fallbackKey];
            if (fallbackValue === null || fallbackValue === undefined) return '';
            return String(fallbackValue).trim();
        }

        function getShipmentDailyFilterValue(shipment) {
            if (typeof getShipmentDailyValue === 'function') {
                return String(getShipmentDailyValue(shipment) || '').trim();
            }
            return getShipmentUpdateValue(shipment);
        }

        async function fetchShipments() {
            const previouslySeenIds = loadSeenShipmentIds();
            const isFirstLoad = previouslySeenIds.size === 0;
            const repIdentifiers = getRepIdentifiers();
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .select('*')
                .order('كود الشحنة', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            const normalizedRepIdentifiers = repIdentifiers.map(normalizeComparableValue);
            const currentShipments = (data || [])
                .map(normalizeShipmentPriceField)
                .filter(shipment => 
                    normalizedRepIdentifiers.includes(normalizeComparableValue(shipment?.المندوب)) ||
                    normalizedRepIdentifiers.includes(normalizeComparableValue(shipment?.['المندوب الفرعي']))
                );
            const currentSeenIds = new Set(currentShipments.map(shipment => String(shipment.id)));
            const newShipments = !isFirstLoad
                ? currentShipments.filter(shipment => !previouslySeenIds.has(String(shipment.id)))
                : [];

            allShipments = currentShipments;
            favoriteShipmentIds = new Set(
                [...favoriteShipmentIds].filter(id => currentShipments.some(shipment => String(shipment.id) === String(id)))
            );
            saveFavoriteShipmentIds(favoriteShipmentIds);
            bumpShipmentsDataVersion();
            pruneBulkSelection();
            saveSeenShipmentIds(currentSeenIds);

            if (newShipments.length > 0) {
                syncUnreadShipments(newShipments);
                showNewShipmentNotification(newShipments);
                // Also add to the persistent notification log (history tab)
                newShipments.forEach(s => addRepNotification('added', s));
            }

            await fetchLockedShipmentIds();
            restoreRepUiState();
            renderShipments();
        }

        async function fetchLockedShipmentIds() {
            const repIdentifiers = getRepIdentifiers();
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SETTLEMENTS)
                .select('order_ids')
                .in('rep_name', repIdentifiers);

            if (error) {
                console.error(error);
                lockedShipmentIds = new Set();
                bumpShipmentsDataVersion();
                return;
            }

            const lockedIds = new Set();
            (data || []).forEach(row => {
                try {
                    const ids = JSON.parse(row.order_ids || '[]');
                    ids.forEach(id => lockedIds.add(String(id)));
                } catch (e) { }
            });

            lockedShipmentIds = lockedIds;
            bumpShipmentsDataVersion();
        }

        function isShipmentLocked(id) {
            return lockedShipmentIds.has(String(id));
        }

        function lockShipmentForFurtherUpdates(id) {
            lockedShipmentIds.add(String(id));
        }

        function isShipmentUpdateLocked(shipmentOrId) {
            const shipment = typeof shipmentOrId === 'object'
                ? shipmentOrId
                : allShipments.find(s => String(s.id) === String(shipmentOrId));

            if (!shipment) return isShipmentLocked(shipmentOrId);
            return isShipmentLocked(shipment.id) || isRejectedStatus(shipment.الحالة);
        }

        function isShipmentBulkEditable(shipment) {
            if (!shipment) return false;
            if (isShipmentLocked(shipment.id)) return false;
            if (isRejectedStatus(shipment.الحالة)) return false;
            if (isDeliveredStatus(shipment.الحالة, shipment)) return false;
            if (isPriceEditShipment(shipment)) return false;
            if (isShippingFeeShipment(shipment)) return false;
            return true;
        }

        function pruneBulkSelection() {
            selectedShipmentIdsForBulk = new Set(
                [...selectedShipmentIdsForBulk].filter((id) => {
                    const shipment = allShipments.find(s => String(s.id) === String(id));
                    return isShipmentBulkEditable(shipment);
                })
            );
        }

        function populateDropdowns() {
            const currentZone = getElementValue('filterZone');
            const currentSender = getElementValue('filterSender');

            const selectedStatuses = getSelectedStatuses();

            const checkStatus = (s) => {
                if (selectedStatuses.length === 0) return true;
                if (selectedStatuses.includes('قيد التوصيل') && isPendingStatus(s.الحالة)) return true;
                if (selectedStatuses.includes('تم') && isDeliveredStatus(s.الحالة, s)) return true;
                if (selectedStatuses.includes('تعديل سعر') && isPriceEditShipment(s)) return true;
                if (selectedStatuses.includes('مؤجل') && isDelayedStatus(s.الحالة)) return true;
                if (selectedStatuses.includes('رفض') && isRejectedStatus(s.الحالة)) return true;
                if (selectedStatuses.includes('شحن') && isShippingFeeShipment(s)) return true;
                return false;
            };

            const dates = [...new Set(allShipments
                .filter(s => 
                    (!currentZone || currentZone === 'الكل' || s.الزون === currentZone) &&
                    (!currentSender || currentSender === 'الكل' || s.الراسل === currentSender) &&
                    checkStatus(s)
                )
                .map(s => getShipmentDailyFilterValue(s))
                .filter(Boolean))].sort().reverse();
            const datesSet = new Set(dates);
            const normalizedSelectedDates = getSelectedDates().filter(date => datesSet.has(date));
            if (normalizedSelectedDates.length !== dateFilterSelections.size) {
                dateFilterSelections = new Set(normalizedSelectedDates);
                saveDateFilter(normalizedSelectedDates[0] || '');
                saveRepUiState();
            }
            const selectedDates = normalizedSelectedDates;

            const zones = [...new Set(allShipments
                .filter(s => 
                    (selectedDates.length === 0 || selectedDates.includes(getShipmentDailyFilterValue(s))) && 
                    (!currentSender || currentSender === 'الكل' || s.الراسل === currentSender) &&
                    checkStatus(s)
                )
                .map(s => s.الزون)
                .filter(Boolean))].sort();

            const senders = [...new Set(allShipments
                .filter(s => 
                    (selectedDates.length === 0 || selectedDates.includes(getShipmentDailyFilterValue(s))) && 
                    (!currentZone || currentZone === 'الكل' || s.الزون === currentZone) &&
                    checkStatus(s)
                )
                .map(s => s.الراسل)
                .filter(Boolean))].sort();

            fillDateDropdown(dates);
            fillStatusDropdown();
            fillZoneDropdown(zones);
            fillSenderDropdown(senders);
        }

        function fillStatusDropdown() {
            const select = el('filterStatus');
            if (!select) return;
            
            const selectedDates = getSelectedDates();
            const currentZone = getElementValue('filterZone');
            const currentSender = getElementValue('filterSender');

            const scopedShipments = allShipments.filter(s => {
                const matchDate = selectedDates.length === 0 || selectedDates.includes(getShipmentDailyFilterValue(s));
                const matchZone = !currentZone || currentZone === 'الكل' || s.الزون === currentZone;
                const matchSender = !currentSender || currentSender === 'الكل' || s.الراسل === currentSender;
                return matchDate && matchZone && matchSender;
            });
            
            const counts = countShipmentsByStatus(scopedShipments);

            ensureStatusSelection();

            let optionsHtml = '';
            STATUS_OPTIONS.forEach(opt => {
                const count = counts[opt] || 0;
                optionsHtml += `<option value="${opt}" class="text-slate-800 bg-white">${opt} (${count})</option>`;
            });

            select.innerHTML = optionsHtml;
            applyActiveSelectState(select, getSelectedStatuses(), STATUS_OPTIONS[0]);
        }

        function fillDateDropdown(items) {
            const select = el('filterDateSelect');
            if (!select) return;

            const selectedValue = getSelectedDates()[0] || '';
            const narrowedData = filterShipmentsCollection(allShipments, {
                zones: getSingleSelectFilter('filterZone'),
                senders: getSingleSelectFilter('filterSender'),
                statuses: getSelectedStatuses()
            });

            narrowedData.forEach(s => {

                items.forEach(item => {

                    optionsHtml += `<option value="${item.replace(/"/g, '&quot;')}" class="text-slate-800 bg-white">${item} (${count})</option>`;
                });
            }

            select.innerHTML = optionsHtml;
            applyActiveSelectState(select, selectedValue ? [selectedValue] : [], '');
        }

        function fillZoneDropdown(items) {
            const select = el('filterZone');
            if (!select) return;

            const selectedArr = getSelectedZones();
            
            const narrowedData = filterShipmentsCollection(allShipments, {
                dates: getSelectedDates(),
                senders: getSingleSelectFilter('filterSender'),
                statuses: getSelectedStatuses()
            });
            const zoneCounts = {};
            narrowedData.forEach(s => {
                const z = s.الزون;
                if (z) zoneCounts[z] = (zoneCounts[z] || 0) + 1;
            });

            let optionsHtml = `<option value="الكل" class="text-slate-800 bg-white">الزون: الكل</option>`;
            if (items && items.length > 0) {
                items.forEach(item => {
                    const count = zoneCounts[item] || 0;
                    optionsHtml += `<option value="${item}" class="text-slate-800 bg-white">${item} (${count})</option>`;
                });
            }

            select.innerHTML = optionsHtml;
            applyActiveSelectState(select, selectedArr);
        }

        function fillSenderDropdown(items) {
            const select = el('filterSender');
            if (!select) return;

            const selectedArr = getSelectedSenders();
            
            const narrowedData = filterShipmentsCollection(allShipments, {
                dates: getSelectedDates(),
                zones: getSingleSelectFilter('filterZone'),
                statuses: getSelectedStatuses()
            });
            const senderCounts = {};
            narrowedData.forEach(s => {
                const sn = s.الراسل;
                if (sn) senderCounts[sn] = (senderCounts[sn] || 0) + 1;
            });

            let optionsHtml = '<option value="الكل" class="text-slate-800 bg-white">الراسل: الكل</option>';
            if (items && items.length > 0) {
                items.forEach(item => {
                    const count = senderCounts[item] || 0;
                    optionsHtml += `<option value="${item}" class="text-slate-800 bg-white">${item} (${count})</option>`;
                });

        function isPriceEditShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            const normalizedReason = String(shipment?.['سبب الحالة'] || shipment?.سبب_الحالة || '').trim();
            return normalizedStatus === 'تعديل سعر' || normalizedReason === 'تعديل سعر';
        }

        function isShippingFeeShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            const normalizedReason = String(shipment?.['سبب الحالة'] || shipment?.سبب_الحالة || '').trim();
            return normalizedStatus === 'شحن' || normalizedReason.includes('شحن');
        }

        function isDeliveredStatus(status, shipment = null) {
            const normalizedStatus = String(status || '').trim();
            if (shipment && isPriceEditShipment(shipment)) return false;
            if (shipment && isShippingFeeShipment(shipment)) return false;
            return normalizedStatus === 'تم' || normalizedStatus === 'تم التسليم';
        }

        function isPendingStatus(status) {
            const normalizedStatus = String(status || '').replace(/\s+/g, ' ').trim();
            return normalizedStatus === '' || normalizedStatus === 'قيد' || normalizedStatus === 'قيد التوصيل' || normalizedStatus === 'قيد التنفيذ';
        }

        function isDelayedStatus(status) {
            const normalizedStatus = String(status || '').trim();
            return normalizedStatus === 'مؤجل' || normalizedStatus === 'مؤجل';
        }

        function isRejectedStatus(status) {
            const normalizedStatus = String(status || '').trim();
            return normalizedStatus === 'رفض' || normalizedStatus === 'الغاء' || normalizedStatus === 'إلغاء';
        }

        function matchesSelectedStatuses(shipment, selectedStatuses = []) {
            if (!selectedStatuses || selectedStatuses.length === 0) return true;
            if (selectedStatuses.includes('قيد التوصيل') && isPendingStatus(shipment.الحالة)) return true;
            if (selectedStatuses.includes('تم') && isDeliveredStatus(shipment.الحالة, shipment)) return true;
            if (selectedStatuses.includes('تعديل سعر') && isPriceEditShipment(shipment)) return true;
            if (selectedStatuses.includes('مؤجل') && isDelayedStatus(shipment.الحالة)) return true;
            if (selectedStatuses.includes('رفض') && isRejectedStatus(shipment.الحالة)) return true;
            if (selectedStatuses.includes('شحن') && isShippingFeeShipment(shipment)) return true;
            return false;
        }

        function matchesShipmentFilters(shipment, filters = {}) {
            const {
                search = '',
                dates = [],
                zones = [],
                senders = [],
                statuses = []
            } = filters;

            const normalizedSearch = String(search || '').trim().toLowerCase();
            if (normalizedSearch) {
                const orderId = String(shipment.order_id || '').toLowerCase();
                const phone = String(shipment.الهاتف || '').toLowerCase();
                const customer = String(shipment.اسم_العميل || '').toLowerCase();
                const altPhone = String(shipment['هاتف بديل'] || shipment.هاتف_بديل || shipment.هات_بديل || '').toLowerCase();
                if (!orderId.includes(normalizedSearch) && !phone.includes(normalizedSearch) && !customer.includes(normalizedSearch) && !altPhone.includes(normalizedSearch)) {
                    return false;
                }
            }

            if (dates.length > 0 && !dates.includes(getShipmentDailyFilterValue(shipment))) return false;
            if (zones.length > 0 && !zones.includes(shipment.الزون)) return false;
            if (senders.length > 0 && !senders.includes(shipment.الراسل)) return false;
            return matchesSelectedStatuses(shipment, statuses);
        }

        function filterShipmentsCollection(shipments, filters = {}) {
            return shipments.filter(shipment => matchesShipmentFilters(shipment, filters));
        }

        function countShipmentsByStatus(shipments) {
            return {
                'قيد التوصيل': shipments.filter(s => isPendingStatus(s.الحالة)).length,
                'تم': shipments.filter(s => isDeliveredStatus(s.الحالة, s)).length,
                'مؤجل': shipments.filter(s => isDelayedStatus(s.الحالة)).length,
                'رفض': shipments.filter(s => isRejectedStatus(s.الحالة)).length,
                'تعديل سعر': shipments.filter(s => isPriceEditShipment(s)).length,
                'شحن': shipments.filter(s => isShippingFeeShipment(s)).length
            };
        }

        function getShipmentStatusLabel(shipment) {
            if (isPendingStatus(shipment.الحالة)) return 'قيد التوصيل';
            if (isPriceEditShipment(shipment)) return shipment['سبب الحالة'] || shipment.سبب_الحالة || 'تعديل سعر';
            if (isDelayedStatus(shipment.الحالة)) return 'مؤجل';
            if (isRejectedStatus(shipment.الحالة)) return 'رفض';
            if (isDeliveredStatus(shipment.الحالة, shipment)) return 'تم';
            return shipment.الحالة || 'قيد التوصيل';
        }

        function shouldHideShipmentUpdateActions(shipment, selectedStatuses = []) {
            return (
                (selectedStatuses.length === 0 && (
                    isDeliveredStatus(shipment.الحالة, shipment) ||
                    isShippingFeeShipment(shipment) ||
                    isPriceEditShipment(shipment)
                )) ||
                (selectedStatuses.includes('تم') && isDeliveredStatus(shipment.الحالة, shipment)) ||
                (selectedStatuses.includes('شحن') && isShippingFeeShipment(shipment)) ||
                (selectedStatuses.includes('تعديل سعر') && isPriceEditShipment(shipment)) ||
                (selectedStatuses.includes('رفض') && isRejectedStatus(shipment.الحالة))
            );
        }

        function getShipmentCommission(shipment) {
            let commissionValue = shipment?.['عمولة المندوب'];
            if (user && user.role === 'مندوب فرعي') {
                commissionValue = shipment?.['عمولة المندوب الفرعي'] || shipment?.عمولة_المندوب_الفرعي || 0;
            }
            const value = parseFloat(commissionValue || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function getShipmentAmount(shipment) {
            const value = parseFloat(shipment?.السعر_بعد_التعديل || shipment?.المبلغ || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function isCommissionEligibleShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            // 'تم' = delivered, isPriceEditShipment = price edit (تعديل سعر), isShippingFeeShipment = shipping fee (شحن)
            return normalizedStatus === 'تم' || normalizedStatus === 'تم التسليم' || isPriceEditShipment(shipment) || isShippingFeeShipment(shipment);
        }

        function getDateFilteredShipments() {
            const selectedDates = getSelectedDates();
            if (selectedDates.length === 0) return [];
            return filterShipmentsCollection(allShipments, { dates: selectedDates });
        }

        function updateFilterCounters() {
            const scopedShipments = getDateFilteredShipments();
            const total = scopedShipments.length;
            const delivered = scopedShipments.filter(s => isDeliveredStatus(s.الحالة, s)).length;
            const shipping = scopedShipments.filter(s => isShippingFeeShipment(s)).length;
            const progress = total ? Math.round((delivered / total) * 100) : 0;

            el('progressPercent').innerText = progress;
            el('progressDelivered').innerText = delivered;
            el('progressShipping').innerText = shipping;
            el('progressTotal').innerText = total;
            el('progressBar').style.width = `${progress}%`;
            el('repCommissionTotal').innerHTML = `${scopedShipments.filter(isCommissionEligibleShipment).reduce((acc, shipment) => acc + getShipmentCommission(shipment), 0)} <span class="text-sm text-slate-800 dark:text-white">ج.م</span>`;
            const remittanceShipments = scopedShipments.filter(s => isCommissionEligibleShipment(s) && !isShipmentLocked(s.id));
            const remittanceAmount = remittanceShipments.reduce((acc, shipment) => acc + getShipmentAmount(shipment), 0);
            el('repShippingStats').innerText = `المطلوب توريده: ${remittanceShipments.length} شحنة | ${remittanceAmount} ج.م`;
        }

        const ARABIC_DIGIT_MAP = {
            '٠': '0', '١': '1', '٢': '2', '٣': '3', '٤': '4',
            '٥': '5', '٦': '6', '٧': '7', '٨': '8', '٩': '9'
        };
        let currentDisplayLimit = 40;
        let lastFilterSignature = '';
        let lastMetaSignature = '';
        let cachedFilteredShipments = [];
        let cachedScopedShipments = [];

        function normalizeArabicDigits(value) {
            return String(value || '').replace(/[٠-٩]/g, (digit) => ARABIC_DIGIT_MAP[digit] || digit);
        }

        function parseShipmentSortTimestamp(value) {
            const raw = normalizeArabicDigits(value).trim();
            if (!raw) return 0;

            const numericDate = raw.match(/^(\d{1,4})[\/\-](\d{1,2})[\/\-](\d{1,4})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?$/);
            if (numericDate) {
                let first = Number(numericDate[1]);
                const second = Number(numericDate[2]);
                let third = Number(numericDate[3]);
                const hours = Number(numericDate[4] || 0);
                const minutes = Number(numericDate[5] || 0);
                const seconds = Number(numericDate[6] || 0);

                let year;
                let month;
                let day;
                if (String(first).length === 4) {
                    year = first;
                    month = second;
                    day = third;
                } else if (String(third).length === 4) {
                    day = first;
                    month = second;
                    year = third;
                } else {
                    year = third;
                    month = second;
                    day = first;
                }

                return new Date(year, Math.max(month - 1, 0), day, hours, minutes, seconds).getTime() || 0;
            }

            return Date.parse(raw) || 0;
        }

        function getShipmentSortTimestamp(shipment) {
            return parseShipmentSortTimestamp(
                shipment?.['تاريخ التحديث'] ||
                shipment?.تاريخ_التحديث ||
                shipment?.updated_at ||
                shipment?.created_at ||
                getShipmentUpdateValue(shipment)
            );
        }

        function getShipmentSortPriority(shipment) {
            if (isShipmentUpdateLocked(shipment?.id)) return 5;
            if (isPendingStatus(shipment?.الحالة)) return 0;
            if (isDelayedStatus(shipment?.الحالة)) return 1;
            if (isRejectedStatus(shipment?.الحالة)) return 2;
            if (isPriceEditShipment(shipment)) return 3;
            if (isDeliveredStatus(shipment?.الحالة, shipment) || isShippingFeeShipment(shipment)) return 4;
            return 6;
        }

        function sortShipmentsSmart(shipments) {
            return [...shipments].sort((a, b) => {
                const priorityDiff = getShipmentSortPriority(a) - getShipmentSortPriority(b);
                if (priorityDiff !== 0) return priorityDiff;

                const timeDiff = getShipmentSortTimestamp(b) - getShipmentSortTimestamp(a);
                if (timeDiff !== 0) return timeDiff;

                const amountDiff = getShipmentAmount(b) - getShipmentAmount(a);
                if (amountDiff !== 0) return amountDiff;

                const codeA = Number(normalizeArabicDigits(a?.order_id || a?.['كود الشحنة'] || a?.الكود || a?.id || 0));
                const codeB = Number(normalizeArabicDigits(b?.order_id || b?.['كود الشحنة'] || b?.الكود || b?.id || 0));
                return codeB - codeA;
            });
        }

        function buildRenderFilters() {
            return {
                search: document.getElementById('searchInput').value,
                dates: getSelectedDates(),
                zones: getSelectedZones(),
                senders: getSelectedSenders(),
                statuses: getSelectedStatuses()
            };
        }

        function getFilterSignature(filters) {
            return JSON.stringify({
                search: String(filters.search || '').trim().toLowerCase(),
                dates: [...(filters.dates || [])].sort(),
                zones: [...(filters.zones || [])].sort(),
                senders: [...(filters.senders || [])].sort(),
                statuses: [...(filters.statuses || [])].sort(),
                view: currentActiveView,
                favorites: [...favoriteShipmentIds].sort(),
                version: shipmentsDataVersion
            });
        }

        function getMetaSignature(filters) {
            return JSON.stringify({
                dates: [...(filters.dates || [])].sort(),
                zones: [...(filters.zones || [])].sort(),
                senders: [...(filters.senders || [])].sort(),
                statuses: [...(filters.statuses || [])].sort(),
                shipments: allShipments.length,
                locked: lockedShipmentIds.size,
                version: shipmentsDataVersion
            });
        }

        function loadMoreShipments() {
            currentDisplayLimit += 40;
            renderShipments(true);
        }

        function renderShipments(append = false) {
            if (append !== true) currentDisplayLimit = 40;
            pruneBulkSelection();

        function getShipmentById(id) {
            return allShipments.find(s => String(s.id) === String(id));

        function getShipmentPhone(shipment, key) {
            return (shipment[key] || '').toString().trim();
        }

        function normalizeWhatsAppPhone(rawPhone) {
            const value = String(rawPhone || '').trim();
            if (!value) return '';

            const primaryPart = value.split('//')[0].split('/')[0].trim();
            let normalized = primaryPart.replace(/[^\d+]/g, '');

            if (!normalized) return '';
            if (normalized.startsWith('+')) {
                normalized = `+${normalized.slice(1).replace(/\+/g, '')}`;
            } else {
                normalized = normalized.replace(/\+/g, '');
            }
            if (normalized.startsWith('00')) normalized = `+${normalized.slice(2)}`;
            if (normalized.startsWith('01') && normalized.length === 11) normalized = `20${normalized.slice(1)}`;
            if (normalized.startsWith('+')) normalized = normalized.slice(1);

            return normalized;
        }

        function normalizeCallPhone(rawPhone) {
            const value = String(rawPhone || '').trim();
            if (!value) return '';

            const primaryPart = value.split('//')[0].split('/')[0].trim();
            return primaryPart.replace(/[^\d+]/g, '');
        }

        function renderShipmentContactActions(shipment) {
            const renderField = (key, label) => {
                const val = getShipmentPhone(shipment, key);
                if (!val) return '';

                const cleaned = normalizeWhatsAppPhone(val);
                const callNumber = normalizeCallPhone(val);
                const isNumeric = /^\+?\d+$/.test(cleaned) && cleaned.length >= 7;

                if (!isNumeric) {
                    return `
                        <div class="flex-1 flex items-center justify-center p-1.5 sm:p-2 bg-slate-100 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">

                        </div>
                    `;
                }

                return `
                    <div class="flex gap-1.5 sm:gap-2">
                        <button data-action="send-whatsapp" data-id="${shipment.id}" data-phone-key="${key}" class="w-9 h-9 sm:w-11 sm:h-11 rounded-full bg-[#25D366] text-white shadow-sm active:scale-95 transition-all flex items-center justify-center" title="واتساب ${label}">

        function formatShipmentCopyText(shipment) {
            const getValue = (value) => {

            return [

        function closeShipmentMenu() {
            const menu = document.getElementById('shipmentMenu');

        function setShipmentMenuActionState(disabled) {
            ['editPriceMenuBtn', 'delayShipmentMenuBtn', 'rejectShipmentMenuBtn'].forEach((buttonId) => {
                const btn = document.getElementById(buttonId);
                if (!btn) return;
                btn.disabled = disabled;

        function toggleShipmentMenu(event, shipmentId) {
            event.stopPropagation();
            const menu = document.getElementById('shipmentMenu');
            const isOpenForSameShipment = activeShipmentMenuId === shipmentId && !menu.classList.contains('hidden');

            if (isOpenForSameShipment) {
                closeShipmentMenu();
                return;
            }

            activeShipmentMenuId = shipmentId;
            menu.classList.remove('hidden');
            setShipmentMenuActionState(isShipmentUpdateLocked(shipmentId));

            const menuWidth = 220;
            const menuHeight = menu.offsetHeight || 220;
            const left = Math.max(12, Math.min(event.clientX - menuWidth + 20, window.innerWidth - menuWidth - 12));
            const top = Math.max(12, Math.min(event.clientY + 12, window.innerHeight - menuHeight - 12));

            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
        }

        async function copyShipmentData(id) {
            const shipment = getShipmentById(id);

                Swal.fire({

        function getStatusColor(shipment) {

            switch (shipment.الحالة) {

            if (isRejectedStatus(shipment.الحالة)) return 'bg-rose-100 text-rose-700';
            switch (shipment.الحالة) {
                case 'تم':

        async function updateStatus(id, status) {
            if (isShipmentUpdateLocked(id)) {
                Swal.fire('تنبيه', 'هذه الشحنة مرتبطة بطلب تسوية ولا يمكن تعديلها مرة أخرى', 'warning');
                return;
            }

            const shipment = allShipments.find(s => s.id == id);
            if (!shipment) return;

            const normalizedStatus = status === 'تم التسليم' ? 'تم' : (status === 'مؤجل' ? 'مؤجل' : status);
            const updatePayload = {
                الحالة: normalizedStatus
            };

            if (arguments.length > 2 && arguments[2]) {
                updatePayload['سبب الحالة'] = arguments[2];
            } else if (normalizedStatus === 'مؤجل') {
                updatePayload['سبب الحالة'] = 'مؤجل';
            }

            if (normalizedStatus === 'تم') {
                updatePayload.السعر_بعد_التعديل = Number(getShipmentAmount(shipment)) || 0;
            }

            const { error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .update(toServerShipmentPayload(updatePayload))
                .eq('id', Number(id) || id);

            if (error) {
                console.error('Update shipment status error:', error);
                Swal.fire('خطأ', error.message || 'فشل تحديث الحالة', 'error');
                return;
            }

            Swal.fire({
                icon: 'success',
                title: 'تم التحديث',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000
            });

            // Local update for smoothness
            const index = allShipments.findIndex(s => s.id == id);
            if (index !== -1) {
                allShipments[index].الحالة = normalizedStatus;
                if (updatePayload['سبب الحالة']) {
                    allShipments[index]['سبب الحالة'] = updatePayload['سبب الحالة'];
                }
                if (Object.prototype.hasOwnProperty.call(updatePayload, 'السعر_بعد_التعديل')) {
                    allShipments[index].السعر_بعد_التعديل = updatePayload.السعر_بعد_التعديل;
                }
            }
            if (normalizedStatus === 'تم' || normalizedStatus === 'شحن') {
                lockShipmentForFurtherUpdates(id);
            }
            bumpShipmentsDataVersion();
            renderShipments();
        }

                        </div>

                `,
                focusConfirm: false,

                const event = payload.eventType;
                const newRow = payload.new;
                const oldRow = payload.old;
                const repIdentifiers = getRepIdentifiers().map(normalizeComparableValue);

                if (event === 'INSERT') {
                    if (repIdentifiers.includes(normalizeComparableValue(newRow.المندوب)) || repIdentifiers.includes(normalizeComparableValue(newRow['المندوب الفرعي']))) {
                        addRepNotification('added', newRow);

                } else if (event === 'UPDATE') {
                    const localOld = allShipments.find(s => String(s.id) === String(newRow.id));
                    const wasMine = localOld && (repIdentifiers.includes(normalizeComparableValue(localOld.المندوب)) || repIdentifiers.includes(normalizeComparableValue(localOld['المندوب الفرعي'])));
                    const currentRepInRows = newRow.hasOwnProperty('المندوب') ? newRow.المندوب : (localOld ? localOld.المندوب : null);
                    const isMine = (currentRepInRows && repIdentifiers.includes(normalizeComparableValue(currentRepInRows))) || (newRow['المندوب الفرعي'] && repIdentifiers.includes(normalizeComparableValue(newRow['المندوب الفرعي'])));

                    const merged = { ...localOld, ...newRow };
                    if (!wasMine && isMine) addRepNotification('added', merged);
                    else if (wasMine && !isMine) addRepNotification('removed', merged);
                    else if (wasMine && isMine && localOld) {
                        const hasChanges = Object.keys(newRow).some(k => {

                        if (hasChanges) {

                                addRepNotification('status_changed', merged);
                            } else {
                                addRepNotification('updated', merged);
                            }
                        }
                    }
                    
                } else if (event === 'DELETE') {
                    const localDeleted = allShipments.find(s => String(s.id) === String(oldRow.id));
                    if (localDeleted && (repIdentifiers.includes(normalizeComparableValue(localDeleted.المندوب)) || repIdentifiers.includes(normalizeComparableValue(localDeleted['المندوب الفرعي'])))) {

        async function applyBulkUpdate() {
            pruneBulkSelection();
            if (selectedShipmentIdsForBulk.size === 0) {
                Swal.fire('تنبيه', 'يرجى تحديد شحنة واحدة على الأقل', 'warning');
                return;
            }

            const status = document.getElementById('bulkStatusSelect').value;
            if (!status) {
                Swal.fire('تنبيه', 'يرجى اختيار الحالة', 'warning');
                return;
            }

            let reason = '';
            if (status === 'رفض') {
                const { value: selectedReason } = await Swal.fire({
                    title: 'سبب الرفض',
                    input: 'select',
                    inputOptions: {
                        'تهرب': 'تهرب ⛔',
                        'رفض': 'رفض',
                        'استلم من قبل': 'استلم من قبل',
                        'رفض دفع شحن': 'رفض دفع شحن',
                        'رفض المنتج غير مطابق': 'رفض المنتج غير مطابق',
                        'مؤجل بعيد': 'مؤجل بعيد'
                    },
                    inputPlaceholder: 'اختر السبب المخصص',
                    showCancelButton: true,
                    confirmButtonText: 'تأكيد',
                    cancelButtonText: 'إلغاء'
                });
                if (!selectedReason) return;
                reason = selectedReason;
            }

            let confirmText = `هل أنت متأكد من تحديث حالة (${selectedShipmentIdsForBulk.size}) شحنة إلى "${status === 'تم' ? 'تم التسليم' : status}"؟`;
            
            const confirmed = await Swal.fire({
                title: 'تأكيد التحديث الجماعي',
                text: confirmText,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'نعم، قم بالتحديث',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#4f46e5'
            });

            if (!confirmed.isConfirmed) return;

            const totalSelectedCount = selectedShipmentIdsForBulk.size;
            const editableShipments = getBulkEditableSelectedShipments();
            const skippedCount = totalSelectedCount - editableShipments.length;

            if (editableShipments.length === 0) {
                Swal.fire('تنبيه', 'لا توجد شحنات قابلة للتحديث ضمن التحديد الحالي', 'warning');
                resetBulkSelectionUi();
                return;
            }

            setBulkUpdateLoadingState(true);

            try {
                Swal.fire({
                    title: 'جاري التحديث...',
                    text: `يتم الآن تحديث ${editableShipments.length} شحنة`,
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                let successCount = 0;
                let failedCount = 0;
                const updates = [];
                
                for (const s of editableShipments) {
                    const id = s.id;
                    const normalizedStatus = status;
                    const updatePayload = { الحالة: normalizedStatus };
                    
                    if (status === 'رفض' || status === 'الغاء') {
                        updatePayload.الحالة = 'الغاء';
                        updatePayload['سبب الحالة'] = reason;
                    } else if (status === 'مؤجل') {
                        updatePayload['سبب الحالة'] = 'مؤجل';
                    } else if (status === 'تم') {
                        updatePayload.السعر_بعد_التعديل = Number(getShipmentAmount(s)) || 0;
                    }

                    updates.push(supabaseClient
                        .from(CONFIG.TABLES.SHIPMENTS)
                        .update(toServerShipmentPayload(updatePayload))
                        .eq('id', Number(id) || id)
                        .then(({error}) => {
                            if (!error) {
                                s.الحالة = updatePayload.الحالة;
                                if (updatePayload['سبب الحالة']) s['سبب الحالة'] = updatePayload['سبب الحالة'];
                                if (updatePayload.السعر_بعد_التعديل !== undefined) s.السعر_بعد_التعديل = updatePayload.السعر_بعد_التعديل;
                                if (normalizedStatus === 'تم' || normalizedStatus === 'شحن') lockShipmentForFurtherUpdates(s.id);
                                successCount++;
                            } else {
                                failedCount++;
                            }
                        })
                        .catch(() => {
                            failedCount++;
                        }));
                }

                await Promise.allSettled(updates);
                resetBulkSelectionUi();
                await fetchShipments();
                Swal.close();

                const summaryParts = [];
                if (successCount > 0) summaryParts.push(`تم تحديث ${successCount} شحنة`);
                if (skippedCount > 0) summaryParts.push(`تم استبعاد ${skippedCount} شحنة غير قابلة للتعديل`);
                if (failedCount > 0) summaryParts.push(`فشل تحديث ${failedCount} شحنة`);

                const hasFailures = failedCount > 0;
                Swal.fire({
                    icon: hasFailures ? 'warning' : 'success',
                    title: hasFailures ? 'تم التحديث جزئيًا' : 'تم التحديث بنجاح',
                    text: summaryParts.join(' | '),
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 4000
                });
            } finally {
                setBulkUpdateLoadingState(false);
            }
        }

            calcDistMs: function(l1, ln1, l2, ln2) {
                const R = 6371e3; const p1 = l1 * Math.PI/180; const p2 = l2 * Math.PI/180;
                const a = Math.sin((l2-l1)*Math.PI/360)**2 + Math.cos(p1)*Math.cos(p2) * Math.sin((ln2-ln1)*Math.PI/360)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
        };
