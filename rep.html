<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب | نظام الشحن الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-indigo-50/50 min-h-screen">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 px-4 py-4 mb-6">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-shipping-fast"></i>
                </div>
                <div>
                    <h1 id="repName" class="text-lg font-bold text-slate-800">جاري التحميل...</h1>
                    <p class="text-xs font-bold text-indigo-600">مندوب توصيل</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-sign-out-alt text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-24">
        <!-- Stats Summary -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="glass p-4 rounded-2xl">
                <p class="text-slate-400 text-xs font-bold mb-1">شحنات اليوم</p>
                <h2 id="totalToday" class="text-2xl font-black text-slate-800">0</h2>
            </div>
            <div class="glass p-4 rounded-2xl">
                <p class="text-slate-400 text-xs font-bold mb-1">تم تسليمها</p>
                <h2 id="deliveredToday" class="text-2xl font-black text-emerald-500">0</h2>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="mb-6 space-y-3">
            <div class="relative">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="بحث برقم الشحنة أو الموبايل..." class="input-field pr-12 text-sm font-semibold shadow-sm">
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setFilter('all')" class="filter-btn active whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold bg-white text-slate-600 border border-slate-200">الكل</button>
                <button onclick="setFilter('قيد التنفيذ')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold bg-white text-slate-600 border border-slate-200">قيد التنفيذ</button>
                <button onclick="setFilter('مؤجل')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold bg-white text-slate-600 border border-slate-200">مؤجل</button>
            </div>
        </div>

        <!-- Shipments List -->
        <div id="shipmentsList" class="space-y-4">
            <!-- Shimmers/Loading -->
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-slate-200 rounded-2xl w-full"></div>
                <div class="h-32 bg-slate-200 rounded-2xl w-full"></div>
            </div>
        </div>
    </main>

    <!-- Navigation Bottom (Mobile Only) -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-full px-8 py-4 flex items-center justify-between shadow-2xl z-50">
        <button class="flex flex-col items-center gap-1 text-indigo-600">
            <i class="fas fa-box text-xl"></i>
            <span class="text-[10px] font-bold">شحناتي</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-map-marked-alt text-xl"></i>
            <span class="text-[10px] font-bold">الخريطة</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">المحفظة</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-bold">الحساب</span>
        </button>
    </nav>

    <script src="js/config.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'rep') {
            window.location.href = 'index.html';
        }

        document.getElementById('repName').innerText = user.full_name || user.username || user.phone;

        let allShipments = [];
        let currentFilter = 'all';

        async function fetchShipments() {
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .select('*')
                .eq('المندوب', user.username || user.phone) // Match by username or phone as per app.py logic
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            allShipments = data;
            renderShipments();
            updateStats();
        }

        function renderShipments() {
            const list = document.getElementById('shipmentsList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allShipments.filter(s => {
                const matchSearch = String(s.order_id).toLowerCase().includes(search) || 
                                   String(s.الهاتف).toLowerCase().includes(search) || 
                                   String(s.اسم_العميل).toLowerCase().includes(search);
                const matchFilter = currentFilter === 'all' || s.الحالة === currentFilter;
                return matchSearch && matchFilter;
            });

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-10 opacity-40">
                        <i class="fas fa-box-open text-5xl mb-3"></i>
                        <p class="font-bold">لا يوجد شحنات تطابق البحث</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(s => `
                <div class="glass p-5 rounded-2xl relative overflow-hidden group transition-all duration-300">
                    <div class="absolute top-0 right-0 w-2 h-full ${getStatusColor(s.الحالة)}"></div>
                    
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-black uppercase tracking-wider text-slate-400">رقم الأوردر</span>
                            <h3 class="text-lg font-black text-slate-800">#${s.order_id}</h3>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black ${getStatusBadgeClass(s.الحالة)}">
                            ${s.الحالة || 'قيد التنفيذ'}
                        </span>
                    </div>

                    <div class="space-y-2 mb-4">
                        <div class="flex items-center gap-2 text-slate-600">
                            <i class="fas fa-user text-xs opacity-40"></i>
                            <span class="text-sm font-bold">${s.اسم_العميل || 'غير مسجل'}</span>
                        </div>
                        <div class="flex items-center gap-2 text-slate-600">
                            <i class="fas fa-map-marker-alt text-xs opacity-40"></i>
                            <span class="text-sm font-semibold line-clamp-1">${s.العنوان || 'بدون عنوان'}</span>
                        </div>
                        <div class="flex items-center gap-2 text-indigo-600">
                            <i class="fas fa-money-bill-wave text-xs opacity-40"></i>
                            <span class="text-lg font-black">${s.المبلغ || 0} ج.م</span>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="updateStatus('${s.id}', 'تم التسليم')" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold text-xs shadow-lg shadow-emerald-200 active:scale-95 transition-all">تم التسليم</button>
                        <button onclick="updateStatus('${s.id}', 'تأجيل')" class="flex-1 bg-amber-500 text-white py-3 rounded-xl font-bold text-xs shadow-lg shadow-amber-200 active:scale-95 transition-all">تأجيل</button>
                        <button onclick="updateStatus('${s.id}', 'رفض')" class="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold text-xs shadow-lg shadow-rose-200 active:scale-95 transition-all">رفض</button>
                        <a href="tel:${s.الهاتف}" class="w-12 bg-white border border-slate-200 text-indigo-600 flex items-center justify-center rounded-xl shadow-sm active:scale-95 transition-all">
                            <i class="fas fa-phone-alt"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            switch(status) {
                case 'تم التسليم': return 'bg-emerald-500';
                case 'تأجيل': return 'bg-amber-500';
                case 'رفض': return 'bg-rose-500';
                default: return 'bg-indigo-500';
            }
        }

        function getStatusBadgeClass(status) {
            switch(status) {
                case 'تم التسليم': return 'bg-emerald-100 text-emerald-700';
                case 'تأجيل': return 'bg-amber-100 text-amber-700';
                case 'رفض': return 'bg-rose-100 text-rose-700';
                default: return 'bg-indigo-100 text-indigo-700';
            }
        }

        async function updateStatus(id, status) {
            const { error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .update({ الحالة: status })
                .eq('id', id);

            if (error) {
                Swal.fire('خطأ', 'فشل تحديث الحالة', 'error');
                return;
            }

            Swal.fire({
                icon: 'success',
                title: 'تم التحديث',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000
            });

            // Local update for smoothness
            const index = allShipments.findIndex(s => s.id == id);
            if (index !== -1) allShipments[index].الحالة = status;
            renderShipments();
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalToday').innerText = allShipments.length;
            document.getElementById('deliveredToday').innerText = allShipments.filter(s => s.الحالة === 'تم التسليم').length;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === (filter === 'all' ? 'الكل' : filter));
                if (btn.classList.contains('active')) {
                    btn.classList.replace('bg-white', 'bg-indigo-600');
                    btn.classList.replace('text-slate-600', 'text-white');
                } else {
                    btn.classList.replace('bg-indigo-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-slate-600');
                }
            });
            renderShipments();
        }

        document.getElementById('searchInput').addEventListener('input', renderShipments);

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        // Real-time listener
        const channel = supabaseClient
            .channel('public:shipments1')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'shipments1' }, payload => {
                fetchShipments(); // Refresh on any change
            })
            .subscribe();

        fetchShipments();
    </script>
</body>
</html>
