<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب | نظام الشحن الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes repDateFilterGlow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.08), 0 0 10px rgba(99, 102, 241, 0.16);
                border-color: rgba(99, 102, 241, 0.45);
                transform: translateY(0) scale(1);
            }
            50% {
                box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.16), 0 0 24px rgba(99, 102, 241, 0.48);
                border-color: rgba(99, 102, 241, 1);
                transform: translateY(-1px) scale(1.01);
            }
        }

        .rep-date-filter-glow {
            animation: repDateFilterGlow 1.1s ease-in-out infinite;
            will-change: box-shadow, border-color, transform;
        }

        @keyframes repUnreadPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.18);
            }
            50% {
                transform: scale(1.04);
                box-shadow: 0 0 0 6px rgba(244, 63, 94, 0.12);
            }
        }

        .rep-unread-badge {
            animation: repUnreadPulse 1.2s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-indigo-50/50 dark:bg-slate-950 min-h-screen transition-colors duration-300">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 px-4 py-4 mb-6">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-shipping-fast"></i>
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <h1 id="repName" class="text-lg font-bold text-slate-800 dark:text-white">جاري التحميل...</h1>
                        <span id="repUnreadBadge" class="hidden rep-unread-badge min-w-6 h-6 px-2 rounded-full bg-rose-500 text-white text-[11px] font-black leading-6 text-center shadow-md">0</span>
                    </div>
                    <p class="text-xs font-bold text-indigo-600">مندوب توصيل</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                    <i id="themeIcon" class="fas fa-moon text-xl"></i>
                </button>
                <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-sign-out-alt text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-24">
        <div class="mb-6">
            <div class="glass rounded-3xl p-5 shadow-sm border border-white/40">
                <div class="flex items-start justify-between gap-4 mb-3">
                    <div class="min-w-0">
                        <p class="text-xs font-black tracking-wide text-indigo-600">نسبة الإنجاز</p>
                        <h2 class="text-2xl font-black text-slate-800 dark:text-white"><span id="progressPercent">0</span>%</h2>
                        <p class="text-sm font-black text-slate-700 dark:text-slate-200"><span id="progressDelivered">0</span> / <span id="progressTotal">0</span></p>
                    </div>
                    <div class="min-w-0 text-left">
                        <p class="text-xs font-black tracking-wide text-emerald-600 mb-1">عمولة المندوب</p>
                        <h2 id="repCommissionTotal" class="text-2xl font-black text-slate-800 dark:text-white">0 <span class="text-sm">ج.م</span></h2>
                        <p id="repShippingStats" class="mt-1 text-xs font-bold text-slate-500 dark:text-slate-300">المطلوب توريده: 0 شحنة | 0 ج.م</p>
                    </div>
                </div>
                <div class="w-full h-3 bg-slate-200/80 dark:bg-slate-800 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-l from-emerald-500 to-indigo-600 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="mb-6 space-y-4">
            <div class="relative">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="بحث برقم الشحنة أو الموبايل..." class="input-field pr-12 text-sm font-semibold shadow-sm">
            </div>

            <div class="flex gap-1 w-full">
                <div class="relative flex-1">
                    <button id="filterDateBtn" onclick="document.getElementById('filterDateMenu').classList.toggle('hidden'); stopDateFilterGlow();" class="rep-date-filter-glow w-full glass px-2 py-2 rounded-xl text-[11px] font-bold text-slate-600 dark:text-slate-300 dark:bg-slate-800 outline-none border border-slate-200 dark:border-slate-700 text-center flex items-center justify-between transition-all duration-300">
                        <span id="filterDateLabel" class="truncate">تاريخ التحديث</span>
                        <i class="fas fa-chevron-down text-[10px] opacity-60"></i>
                    </button>
                    <div id="filterDateMenu" class="hidden absolute top-full right-0 mt-1 min-w-[200px] w-full glass rounded-xl shadow-lg border border-slate-200 dark:bg-slate-800 dark:border-slate-700 max-h-48 overflow-y-auto z-[60] p-2 flex flex-col gap-1 text-right text-xs"></div>
                </div>
                <div class="relative flex-1">
                    <button id="filterZoneBtn" onclick="document.getElementById('filterZoneMenu').classList.toggle('hidden');" class="w-full glass px-2 py-2 rounded-xl text-[11px] font-bold text-slate-600 dark:text-slate-300 dark:bg-slate-800 outline-none border border-slate-200 dark:border-slate-700 text-center flex items-center justify-between transition-all duration-300">
                        <span id="filterZoneLabel" class="truncate">الزون</span>
                        <i class="fas fa-chevron-down text-[10px] opacity-60"></i>
                    </button>
                    <div id="filterZoneMenu" class="hidden absolute top-full right-0 mt-1 min-w-[200px] w-full glass rounded-xl shadow-lg border border-slate-200 dark:bg-slate-800 dark:border-slate-700 max-h-48 overflow-y-auto z-[60] p-2 flex flex-col gap-1 text-right text-xs"></div>
                </div>
                <div class="relative flex-1">
                    <button id="filterSenderBtn" onclick="document.getElementById('filterSenderMenu').classList.toggle('hidden');" class="w-full glass px-2 py-2 rounded-xl text-[11px] font-bold text-slate-600 dark:text-slate-300 dark:bg-slate-800 outline-none border border-slate-200 dark:border-slate-700 text-center flex items-center justify-between transition-all duration-300">
                        <span id="filterSenderLabel" class="truncate">الراسل</span>
                        <i class="fas fa-chevron-down text-[10px] opacity-60"></i>
                    </button>
                    <div id="filterSenderMenu" class="hidden absolute top-full right-0 mt-1 min-w-[200px] w-full glass rounded-xl shadow-lg border border-slate-200 dark:bg-slate-800 dark:border-slate-700 max-h-48 overflow-y-auto z-[60] p-2 flex flex-col gap-1 text-right text-xs"></div>
                </div>
            </div>

            <div id="statusFilters" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setFilter('قيد التوصيل')" class="filter-btn active whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold bg-indigo-600 text-white border border-indigo-600">
                    قيد التوصيل (<span id="count-pending">0</span>)
                </button>
                <button onclick="setFilter('تم التسليم')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-600 border border-slate-200">
                    تم (<span id="count-delivered">0</span>)
                </button>
                <button onclick="setFilter('تأجيل')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-600 border border-slate-200">
                    مؤجل (<span id="count-delayed">0</span>)
                </button>
                <button onclick="setFilter('رفض')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-600 border border-slate-200">
                    رفض (<span id="count-rejected">0</span>)
                </button>
                <button onclick="setFilter('تعديل سعر')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-600 border border-slate-200">
                    تعديل سعر (<span id="count-price">0</span>)
                </button>
                <button onclick="setFilter('all')" class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-600 border border-slate-200">
                    الكل (<span id="count-all">0</span>)
                </button>
            </div>
        </div>

        <!-- Shipments List -->
        <div id="shipmentsList" class="space-y-4">
            <!-- Shimmers/Loading -->
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-slate-200 rounded-2xl w-full"></div>
                <div class="h-32 bg-slate-200 rounded-2xl w-full"></div>
            </div>
        </div>
        <div id="shipmentMenu" class="hidden fixed z-50 min-w-[220px] rounded-2xl border border-slate-200 bg-white p-2 shadow-2xl">
            <button onclick="copyShipmentDataFromMenu()" class="w-full rounded-xl px-4 py-3 text-right text-sm font-bold text-slate-700 transition-colors hover:bg-slate-100">
                نسخ بيانات الشحنة
            </button>
        </div>
    </main>

    <!-- Navigation Bottom (Mobile Only) -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-full px-8 py-4 flex items-center justify-between shadow-2xl z-50">
        <button class="flex flex-col items-center gap-1 text-indigo-600">
            <i class="fas fa-box text-xl"></i>
            <span class="text-[10px] font-bold">شحناتي</span>
        </button>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">المحفظة</span>
        </a>
        <a href="account.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-bold">الحساب</span>
        </a>
    </nav>

    <script src="js/config.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'rep') {
            window.location.href = 'index.html';
        }

        document.getElementById('repName').innerText = user.full_name || user.username || user.phone;

        let allShipments = [];
        let currentFilter = 'قيد التوصيل';
        let activeShipmentMenuId = null;
        let lockedShipmentIds = new Set();
        const REP_UI_STATE_KEY = 'repUiState';
        const REP_SEEN_SHIPMENTS_KEY_PREFIX = 'repSeenShipments:';
        const REP_UNREAD_SESSION_KEY = 'repUnreadShipments:';
        let notificationAudioContext = null;
        let dateFilterSelections = new Set();
        let zoneFilterSelections = new Set();
        let senderFilterSelections = new Set();
        let dateFilterGlowTimeout = null;

        function getSelectedDates() {
            return Array.from(dateFilterSelections);
        }

        function getSelectedZones() {
            return Array.from(zoneFilterSelections);
        }

        function getSelectedSenders() {
            return Array.from(senderFilterSelections);
        }

        function toggleDateSelection(value) {
            const normalizedValue = String(value || '').trim();
            if (!normalizedValue) return;

            if (dateFilterSelections.has(normalizedValue)) dateFilterSelections.delete(normalizedValue);
            else dateFilterSelections.add(normalizedValue);
            
            saveDateFilter(getSelectedDates()[0] || '');
            saveRepUiState();
            stopDateFilterGlow();
            renderShipments();
        }

        function toggleZoneSelection(value) {
            const normalizedValue = String(value || '').trim();
            if (!normalizedValue) return;

            if (zoneFilterSelections.has(normalizedValue)) zoneFilterSelections.delete(normalizedValue);
            else zoneFilterSelections.add(normalizedValue);
            
            saveRepUiState();
            renderShipments();
        }

        function toggleSenderSelection(value) {
            const normalizedValue = String(value || '').trim();
            if (!normalizedValue) return;

            if (senderFilterSelections.has(normalizedValue)) senderFilterSelections.delete(normalizedValue);
            else senderFilterSelections.add(normalizedValue);
            
            saveRepUiState();
            renderShipments();
        }

        function stopDateFilterGlow() {
            if (dateFilterGlowTimeout) {
                clearTimeout(dateFilterGlowTimeout);
                dateFilterGlowTimeout = null;
            }
        }

        function triggerDateFilterGlow() {
            const btn = document.getElementById('filterDateBtn');
            const menu = document.getElementById('filterDateMenu');
            if (!btn || !menu || !menu.classList.contains('hidden')) return;

            btn.classList.add('rep-date-filter-glow');
            if (dateFilterGlowTimeout) {
                clearTimeout(dateFilterGlowTimeout);
                dateFilterGlowTimeout = null;
            }
        }

        function saveRepUiState() {
            try {
                localStorage.setItem(REP_UI_STATE_KEY, JSON.stringify({
                    search: document.getElementById('searchInput')?.value || '',
                    date: getSelectedDates(),
                    zone: getSelectedZones(),
                    sender: getSelectedSenders(),
                    currentFilter
                }));
            } catch (error) {}
        }

        function restoreRepUiState() {
            let state = null;
            try {
                state = JSON.parse(localStorage.getItem(REP_UI_STATE_KEY) || 'null');
            } catch (error) {}

            if (state && state.date) {
                const dates = Array.isArray(state.date) ? state.date : [state.date];
                dates.map(d => String(d || '').trim()).filter(Boolean).forEach(d => dateFilterSelections.add(d));
            } else {
                const legacyDate = getSavedDateFilter();
                const normalizedLegacyDate = String(legacyDate || '').trim();
                if (normalizedLegacyDate) dateFilterSelections.add(normalizedLegacyDate);
            }

            if (!state) return;

            if (state && state.zone) {
                const zones = Array.isArray(state.zone) ? state.zone : [state.zone];
                zones.map(z => String(z || '').trim()).filter(Boolean).forEach(z => zoneFilterSelections.add(z));
            }

            if (!state) return;

            if (state && state.sender) {
                const senders = Array.isArray(state.sender) ? state.sender : [state.sender];
                senders.map(s => String(s || '').trim()).filter(Boolean).forEach(s => senderFilterSelections.add(s));
            }

            if (!state) return;

            const searchInput = document.getElementById('searchInput');

            if (searchInput) searchInput.value = state.search || '';
            currentFilter = state.currentFilter || currentFilter;
            syncFilterButtons(currentFilter);
        }

        function syncFilterButtons(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const onClickAttr = btn.getAttribute('onclick') || '';
                const isMatch = onClickAttr.includes(`'${filter}'`);

                btn.classList.toggle('active', isMatch);
                if (isMatch) {
                    btn.classList.replace('bg-white', 'bg-indigo-600');
                    btn.classList.replace('text-slate-600', 'text-white');
                    btn.classList.replace('border-slate-200', 'border-indigo-600');
                } else {
                    btn.classList.replace('bg-indigo-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-slate-600');
                    btn.classList.replace('border-indigo-600', 'border-slate-200');
                }
            });
        }

        function getRepIdentifiers() {
            return [...new Set([
                user.full_name,
                user.username,
                user.phone
            ].map(value => String(value || '').trim()).filter(Boolean))];
        }

        function normalizeComparableValue(value) {
            return String(value || '').replace(/\s+/g, ' ').trim();
        }

        function getUnreadSessionKey() {
            const repKey = normalizeComparableValue(user?.username || user?.phone || user?.full_name || 'rep');
            return `${REP_UNREAD_SESSION_KEY}${repKey}`;
        }

        function loadUnreadShipmentIds() {
            try {
                const raw = sessionStorage.getItem(getUnreadSessionKey());
                const ids = JSON.parse(raw || '[]');
                return new Set((Array.isArray(ids) ? ids : []).map(id => String(id)));
            } catch (error) {
                return new Set();
            }
        }

        function saveUnreadShipmentIds(ids) {
            try {
                sessionStorage.setItem(getUnreadSessionKey(), JSON.stringify([...ids]));
            } catch (error) {}
        }

        function setUnreadBadge(count) {
            const badge = document.getElementById('repUnreadBadge');
            if (!badge) return;

            const safeCount = Number(count) || 0;
            badge.innerText = safeCount > 99 ? '99+' : String(safeCount);
            badge.classList.toggle('hidden', safeCount <= 0);
            document.title = safeCount > 0 ? `(${safeCount}) لوحة المندوب | نظام الشحن الاحترافي` : 'لوحة المندوب | نظام الشحن الاحترافي';
        }

        function initUnreadBadge() {
            const unreadIds = loadUnreadShipmentIds();
            setUnreadBadge(unreadIds.size);
        }

        function playNotificationSound() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;

                if (!notificationAudioContext) {
                    notificationAudioContext = new AudioContextClass();
                }

                if (notificationAudioContext.state === 'suspended') {
                    notificationAudioContext.resume().catch(() => {});
                }

                const now = notificationAudioContext.currentTime;
                const gain = notificationAudioContext.createGain();
                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(0.15, now + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
                gain.connect(notificationAudioContext.destination);

                [880, 1320].forEach((freq, index) => {
                    const osc = notificationAudioContext.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.12);
                    osc.connect(gain);
                    osc.start(now + index * 0.12);
                    osc.stop(now + 0.18 + index * 0.12);
                });
            } catch (error) {}
        }

        function enableAudioOnInteraction() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            if (!notificationAudioContext) {
                try {
                    notificationAudioContext = new AudioContextClass();
                } catch (error) {}
            }
            if (notificationAudioContext && notificationAudioContext.state === 'suspended') {
                notificationAudioContext.resume().catch(() => {});
            }
        }

        window.addEventListener('pointerdown', enableAudioOnInteraction, { once: true, passive: true });
        window.addEventListener('keydown', enableAudioOnInteraction, { once: true });

        function syncUnreadShipments(newShipments) {
            if (!newShipments || newShipments.length === 0) return;

            const unreadIds = loadUnreadShipmentIds();
            let changed = false;
            newShipments.forEach(shipment => {
                const id = String(shipment?.id || '');
                if (!id || unreadIds.has(id)) return;
                unreadIds.add(id);
                changed = true;
            });

            if (!changed) return;

            saveUnreadShipmentIds(unreadIds);
            setUnreadBadge(unreadIds.size);
            playNotificationSound();
        }

        function getRepNotificationKey() {
            const repKey = normalizeComparableValue(user?.username || user?.phone || user?.full_name || 'rep');
            return `${REP_SEEN_SHIPMENTS_KEY_PREFIX}${repKey}`;
        }

        function loadSeenShipmentIds() {
            try {
                const raw = localStorage.getItem(getRepNotificationKey());
                const ids = JSON.parse(raw || '[]');
                return new Set((Array.isArray(ids) ? ids : []).map(id => String(id)));
            } catch (error) {
                return new Set();
            }
        }

        function saveSeenShipmentIds(ids) {
            try {
                localStorage.setItem(getRepNotificationKey(), JSON.stringify([...ids]));
            } catch (error) {}
        }

        function getShipmentDisplayLabel(shipment) {
            return String(
                shipment?.كود_الشحنة ||
                shipment?.order_id ||
                shipment?.id ||
                shipment?.الاسم ||
                ''
            ).trim();
        }

        function showNewShipmentNotification(newShipments) {
            if (!newShipments || newShipments.length === 0) return;

            const count = newShipments.length;
            const codes = newShipments
                .map(getShipmentDisplayLabel)
                .filter(Boolean)
                .slice(0, 3);
            const extra = count > codes.length ? ` و${count - codes.length} أخرى` : '';
            const body = codes.length
                ? `تم تنزيل ${count} شحنة جديدة عليك: ${codes.join('، ')}${extra}`
                : `تم تنزيل ${count} شحنة جديدة عليك`;

            Swal.fire({
                toast: true,
                position: 'top-start',
                icon: 'success',
                title: 'شحنات جديدة',
                text: body,
                showConfirmButton: false,
                timer: 5000,
                timerProgressBar: true
            });

            if ('Notification' in window && Notification.permission === 'granted') {
                try {
                    new Notification('شحنات جديدة للمندوب', {
                        body,
                        dir: 'rtl'
                    });
                } catch (error) {}
            }
        }

        function getShipmentUpdateValue(shipment) {
            const directValue = shipment?.الابيديت ?? shipment?.['الابيديت'] ?? shipment?.الابديت ?? shipment?.['الابديت'];
            if (directValue !== null && directValue !== undefined) {
                const normalized = String(directValue).trim();
                if (normalized) return normalized;
            }

            if (!shipment || typeof shipment !== 'object') return '';
            const fallbackKey = Object.keys(shipment).find((key) => {
                const normalizedKey = String(key || '').replace(/\s+/g, '').trim();
                return normalizedKey === 'الابيديت' || normalizedKey === 'الابديت';
            });
            if (!fallbackKey) return '';

            const fallbackValue = shipment[fallbackKey];
            if (fallbackValue === null || fallbackValue === undefined) return '';
            return String(fallbackValue).trim();
        }

        async function fetchShipments() {
            const previouslySeenIds = loadSeenShipmentIds();
            const isFirstLoad = previouslySeenIds.size === 0;
            const repIdentifiers = getRepIdentifiers();
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            const normalizedRepIdentifiers = repIdentifiers.map(normalizeComparableValue);
            const currentShipments = (data || []).filter(shipment => normalizedRepIdentifiers.includes(normalizeComparableValue(shipment?.المندوب)));
            const currentSeenIds = new Set(currentShipments.map(shipment => String(shipment.id)));
            const newShipments = !isFirstLoad
                ? currentShipments.filter(shipment => !previouslySeenIds.has(String(shipment.id)))
                : [];

            allShipments = currentShipments;
            saveSeenShipmentIds(currentSeenIds);

            if (newShipments.length > 0) {
                syncUnreadShipments(newShipments);
                showNewShipmentNotification(newShipments);
            }

            await fetchLockedShipmentIds();
            restoreRepUiState();
            populateDropdowns();
            updateFilterCounters();
            renderShipments();
        }

        async function fetchLockedShipmentIds() {
            const repIdentifiers = getRepIdentifiers();
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SETTLEMENTS)
                .select('order_ids')
                .in('rep_name', repIdentifiers);

            if (error) {
                console.error(error);
                lockedShipmentIds = new Set();
                return;
            }

            const lockedIds = new Set();
            (data || []).forEach(row => {
                try {
                    const ids = JSON.parse(row.order_ids || '[]');
                    ids.forEach(id => lockedIds.add(String(id)));
                } catch (e) {}
            });

            lockedShipmentIds = lockedIds;
        }

        function isShipmentLocked(id) {
            return lockedShipmentIds.has(String(id));
        }

        function populateDropdowns() {
            const currentZone = document.getElementById('filterZone')?.value || '';
            const currentSender = document.getElementById('filterSender')?.value || '';

            const dates = [...new Set(allShipments
                .map(s => getShipmentUpdateValue(s))
                .filter(Boolean))].sort().reverse();
            const datesSet = new Set(dates);
            const normalizedSelectedDates = getSelectedDates().filter(date => datesSet.has(date));
            if (normalizedSelectedDates.length !== dateFilterSelections.size) {
                dateFilterSelections = new Set(normalizedSelectedDates);
                saveDateFilter(normalizedSelectedDates[0] || '');
                saveRepUiState();
            }
            const selectedDates = normalizedSelectedDates;

            const zones = [...new Set(allShipments
                .filter(s => (selectedDates.length === 0 || selectedDates.includes(getShipmentUpdateValue(s))) && (!currentSender || s.الراسل === currentSender))
                .map(s => s.الزون)
                .filter(Boolean))].sort();

            const senders = [...new Set(allShipments
                .filter(s => (selectedDates.length === 0 || selectedDates.includes(getShipmentUpdateValue(s))) && (!currentZone || s.الزون === currentZone))
                .map(s => s.الراسل)
                .filter(Boolean))].sort();

            fillDateDropdown(dates);
            fillZoneDropdown(zones);
            fillSenderDropdown(senders);
        }

        function fillDateDropdown(items) {
            const menu = document.getElementById('filterDateMenu');
            const label = document.getElementById('filterDateLabel');
            if (!menu || !label) return;
            
            const selectedArr = getSelectedDates();
            label.innerText = selectedArr.length > 0 ? `تاريخ التحديث (${selectedArr.length})` : 'تاريخ التحديث';

            if (!items || items.length === 0) {
                menu.innerHTML = `
                    <div class="px-2 py-3 text-center text-[11px] font-bold text-slate-500 dark:text-slate-300">
                        لا يوجد ابيديت متاح
                    </div>
                `;
                return;
            }

            // Calculate counts for each date
            const dateCounts = {};
            allShipments.forEach(s => {
                const d = getShipmentUpdateValue(s);
                if (d) dateCounts[d] = (dateCounts[d] || 0) + 1;
            });

            menu.innerHTML = items.map(item => {
                const isSelected = dateFilterSelections.has(item);
                const count = dateCounts[item] || 0;
                return `
                    <label class="flex items-center justify-between gap-2 p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" onclick="event.stopPropagation()">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange='toggleDateSelection(${JSON.stringify(item)})' class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300">
                            <span class="text-slate-700 dark:text-slate-200 font-bold">${item}</span>
                        </div>
                        <span class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full font-black">${count}</span>
                    </label>
                `;
            }).join('');
        }

        function fillZoneDropdown(items) {
            const menu = document.getElementById('filterZoneMenu');
            const label = document.getElementById('filterZoneLabel');
            if (!menu || !label) return;
            
            const selectedArr = getSelectedZones();
            label.innerText = selectedArr.length > 0 ? `الزون (${selectedArr.length})` : 'الزون';

            if (!items || items.length === 0) {
                menu.innerHTML = `
                    <div class="px-2 py-3 text-center text-[11px] font-bold text-slate-500 dark:text-slate-300">
                        لا يوجد مناطق متاحة
                    </div>
                `;
                return;
            }

            // Calculate counts for each zone based on narrowed data
            const selectedDates = getSelectedDates();
            const narrowedData = allShipments.filter(s => selectedDates.length === 0 || selectedDates.includes(getShipmentUpdateValue(s)));
            const zoneCounts = {};
            narrowedData.forEach(s => {
                const z = s.الزون;
                if (z) zoneCounts[z] = (zoneCounts[z] || 0) + 1;
            });

            menu.innerHTML = items.map(item => {
                const isSelected = zoneFilterSelections.has(item);
                const count = zoneCounts[item] || 0;
                return `
                    <label class="flex items-center justify-between gap-2 p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" onclick="event.stopPropagation()">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange='toggleZoneSelection(${JSON.stringify(item)})' class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300">
                            <span class="text-slate-700 dark:text-slate-200 font-bold">${item}</span>
                        </div>
                        <span class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full font-black">${count}</span>
                    </label>
                `;
            }).join('');
        }

        function fillSenderDropdown(items) {
            const menu = document.getElementById('filterSenderMenu');
            const label = document.getElementById('filterSenderLabel');
            if (!menu || !label) return;
            
            const selectedArr = getSelectedSenders();
            label.innerText = selectedArr.length > 0 ? `الراسل (${selectedArr.length})` : 'الراسل';

            if (!items || items.length === 0) {
                menu.innerHTML = `
                    <div class="px-2 py-3 text-center text-[11px] font-bold text-slate-500 dark:text-slate-300">
                        لا يوجد رواسل متاحة
                    </div>
                `;
                return;
            }

            // Calculate counts for each sender based on narrowed data
            const selectedDates = getSelectedDates();
            const selectedZones = getSelectedZones();
            const narrowedData = allShipments.filter(s => {
                const matchDate = selectedDates.length === 0 || selectedDates.includes(getShipmentUpdateValue(s));
                const matchZone = selectedZones.length === 0 || selectedZones.includes(s.الزون);
                return matchDate && matchZone;
            });
            const senderCounts = {};
            narrowedData.forEach(s => {
                const sn = s.الراسل;
                if (sn) senderCounts[sn] = (senderCounts[sn] || 0) + 1;
            });

            menu.innerHTML = items.map(item => {
                const isSelected = senderFilterSelections.has(item);
                const count = senderCounts[item] || 0;
                return `
                    <label class="flex items-center justify-between gap-2 p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" onclick="event.stopPropagation()">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange='toggleSenderSelection(${JSON.stringify(item)})' class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300">
                            <span class="text-slate-700 dark:text-slate-200 font-bold">${item}</span>
                        </div>
                        <span class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full font-black">${count}</span>
                    </label>
                `;
            }).join('');
        }

        function fillSelect(id, items, defaultText, currentValue = '') {
            const select = document.getElementById(id);
            if (!select) return;
            select.innerHTML = `<option value="">${defaultText}</option>`;
            items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.innerText = item;
                select.appendChild(opt);
            });
            select.value = items.includes(currentValue) ? currentValue : '';
        }

        function isPriceEditShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            const normalizedReason = String(shipment?.سبب_الحالة || '').trim();
            return normalizedStatus === 'تعديل سعر' || normalizedReason === 'تعديل سعر';
        }

        function isDeliveredStatus(status, shipment = null) {
            const normalizedStatus = String(status || '').trim();
            if (shipment && isPriceEditShipment(shipment)) return false;
            return normalizedStatus === 'تم' || normalizedStatus === 'تم التسليم' || normalizedStatus === 'شحن';
        }

        function isPendingStatus(status) {
            const normalizedStatus = String(status || '').replace(/\s+/g, ' ').trim();
            return normalizedStatus === '' || normalizedStatus === 'قيد' || normalizedStatus === 'قيد التوصيل' || normalizedStatus === 'قيد التنفيذ';
        }

        function isDelayedStatus(status) {
            const normalizedStatus = String(status || '').trim();
            return normalizedStatus === 'تأجيل' || normalizedStatus === 'مؤجل';
        }

        function isRejectedStatus(status) {
            const normalizedStatus = String(status || '').trim();
            return normalizedStatus === 'رفض' || normalizedStatus === 'الغاء' || normalizedStatus === 'إلغاء';
        }

        function getShipmentCommission(shipment) {
            const value = parseFloat(shipment?.['عمولة المندوب'] || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function getShipmentAmount(shipment) {
            const value = parseFloat(shipment?.السعر_بعد_التعديل || shipment?.المبلغ || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function getAdjustedShipmentAmount(shipment) {
            const value = parseFloat(shipment?.السعر_بعد_التعديل || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function isCommissionEligibleShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            return normalizedStatus === 'تم' || normalizedStatus === 'تم التسليم' || normalizedStatus === 'شحن' || isPriceEditShipment(shipment);
        }

        function getDateFilteredShipments() {
            const selectedDates = getSelectedDates();
            if (selectedDates.length === 0) return [];
            return allShipments.filter(s => selectedDates.includes(getShipmentUpdateValue(s)));
        }

        function updateFilterCounters() {
            const scopedShipments = getDateFilteredShipments();
            const total = scopedShipments.length;
            const delivered = scopedShipments.filter(s => isDeliveredStatus(s.الحالة, s)).length;
            const pending = scopedShipments.filter(s => isPendingStatus(s.الحالة)).length;
            const progress = total ? Math.round((delivered / total) * 100) : 0;

            document.getElementById('count-all').innerText = total;
            document.getElementById('count-pending').innerText = pending;
            document.getElementById('count-delivered').innerText = delivered;
            document.getElementById('count-delayed').innerText = scopedShipments.filter(s => isDelayedStatus(s.الحالة)).length;
            document.getElementById('count-rejected').innerText = scopedShipments.filter(s => isRejectedStatus(s.الحالة)).length;
            document.getElementById('count-price').innerText = scopedShipments.filter(s => isPriceEditShipment(s)).length;

            document.getElementById('progressPercent').innerText = progress;
            document.getElementById('progressDelivered').innerText = delivered;
            document.getElementById('progressTotal').innerText = total;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('repCommissionTotal').innerHTML = `${scopedShipments.filter(isCommissionEligibleShipment).reduce((acc, shipment) => acc + getShipmentCommission(shipment), 0)} <span class="text-sm text-slate-800 dark:text-white">ج.م</span>`;
            const remittanceShipments = scopedShipments.filter(s => isCommissionEligibleShipment(s) && !isShipmentLocked(s.id));
            const remittanceAmount = remittanceShipments.reduce((acc, shipment) => acc + getAdjustedShipmentAmount(shipment), 0);
            document.getElementById('repShippingStats').innerText = `المطلوب توريده: ${remittanceShipments.length} شحنة | ${remittanceAmount} ج.م`;
        }

        function renderShipments() {
            populateDropdowns();
            updateFilterCounters();

            const list = document.getElementById('shipmentsList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const selectedDates = getSelectedDates();
            const selectedZones = getSelectedZones();
            const selectedSenders = getSelectedSenders();

            if (selectedDates.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-10 opacity-60">
                        <i class="fas fa-calendar-alt text-5xl mb-3"></i>
                        <p class="font-bold">يرجى اختيار تاريخ التحديث أولاً لعرض الشحنات وتشغيل الفلاتر والإحصائيات</p>
                    </div>
                `;
                return;
            }
            
            const filtered = allShipments.filter(s => {
                const matchSearch = String(s.order_id).toLowerCase().includes(search) || 
                                   String(s.الهاتف).toLowerCase().includes(search) || 
                                   String(s.اسم_العميل).toLowerCase().includes(search);
                
                let matchFilter = false;
                if (currentFilter === 'all') matchFilter = true;
                else if (currentFilter === 'قيد التوصيل' || currentFilter === 'قيد التنفيذ') matchFilter = isPendingStatus(s.الحالة);
                else if (currentFilter === 'تم التسليم') matchFilter = isDeliveredStatus(s.الحالة, s);
                else if (currentFilter === 'تعديل سعر') matchFilter = isPriceEditShipment(s);
                else if (currentFilter === 'تأجيل') matchFilter = isDelayedStatus(s.الحالة);
                else if (currentFilter === 'رفض') matchFilter = isRejectedStatus(s.الحالة);
                else matchFilter = s.الحالة === currentFilter;

                const matchDate = selectedDates.includes(getShipmentUpdateValue(s));
                const matchZone = selectedZones.length === 0 || selectedZones.includes(s.الزون);
                const matchSender = selectedSenders.length === 0 || selectedSenders.includes(s.الراسل);

                return matchSearch && matchFilter && matchDate && matchZone && matchSender;
            });

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-10 opacity-40">
                        <i class="fas fa-box-open text-5xl mb-3"></i>
                        <p class="font-bold">لا يوجد شحنات تطابق البحث</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(s => `
                <div class="glass p-5 rounded-2xl relative overflow-hidden group transition-all duration-300 shadow-sm border border-white/40">
                    <div class="absolute top-0 right-0 w-2 h-full ${getStatusColor(s)}"></div>
                    
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <button onclick="toggleShipmentMenu(event, '${s.id}')" class="mb-2 flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white/95 text-slate-500 shadow-sm transition-colors hover:text-indigo-600" title="خيارات الشحنة" aria-label="خيارات الشحنة">
                                <i class="fas fa-ellipsis-v"></i>
                            </button>
                            <span class="text-[10px] font-black uppercase tracking-wider text-slate-400">#${s.order_id}</span>
                            <h3 class="text-md font-black text-slate-800">${s.اسم_العميل || 'غير مسجل'}</h3>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black ${getStatusBadgeClass(s)}">
                            ${isPendingStatus(s.الحالة) ? 'قيد التوصيل' : (isPriceEditShipment(s) ? 'تعديل سعر' : (isDelayedStatus(s.الحالة) ? 'مؤجل' : (isRejectedStatus(s.الحالة) ? 'رفض' : (isDeliveredStatus(s.الحالة, s) ? 'تم' : (s.الحالة || 'قيد التوصيل')))))}
                        </span>
                    </div>

                    <div class="space-y-2 mb-4">
                        <div class="flex items-center gap-2 text-slate-500">
                            <i class="fas fa-map-marker-alt text-[10px] opacity-40"></i>
                            <span class="text-xs font-bold line-clamp-1">${s.العنوان || 'بدون عنوان'}</span>
                        </div>
                        <div class="flex items-center gap-2 text-slate-500">
                            <i class="fas fa-box-open text-[10px] opacity-40"></i>
                            <span class="text-xs font-bold line-clamp-1">${s.المنتج || s.المنتجات || 'بدون منتج'}</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400">
                             <span><i class="fas fa-store me-1"></i>${s.الراسل || '---'}</span>
                             <span><i class="fas fa-calendar-alt me-1"></i>${getShipmentUpdateValue(s) || '---'}</span>
                        </div>
                        <div class="flex items-center gap-2 text-indigo-600">
                            <i class="fas fa-money-bill-wave text-xs opacity-40"></i>
                            <span class="text-lg font-black">${s.السعر_بعد_التعديل || s.المبلغ || 0} ج.م</span>
                        </div>
                    </div>

                    <div class="flex gap-2 mt-4">
                        <button onclick="updateStatus('${s.id}', 'تم التسليم')" ${isShipmentLocked(s.id) ? 'disabled' : ''} class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold text-[11px] shadow-lg shadow-emerald-200 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">تم التسليم</button>
                        <button onclick="editPrice('${s.id}')" ${isShipmentLocked(s.id) ? 'disabled' : ''} class="flex-1 bg-cyan-500 text-white py-3 rounded-xl font-bold text-[11px] shadow-lg shadow-cyan-200 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">تعديل سعر</button>
                        <button onclick="updateStatus('${s.id}', 'تأجيل')" ${isShipmentLocked(s.id) ? 'disabled' : ''} class="flex-1 bg-amber-500 text-white py-3 rounded-xl font-bold text-[11px] shadow-lg shadow-amber-200 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">تأجيل</button>
                        <button onclick="updateStatus('${s.id}', 'رفض')" ${isShipmentLocked(s.id) ? 'disabled' : ''} class="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold text-[11px] shadow-lg shadow-rose-200 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">رفض</button>
                    </div>
                    ${isShipmentLocked(s.id) ? `
                        <div class="mt-3 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-center text-[11px] font-bold text-amber-700">
                            هذه الشحنة مرتبطة بطلب تسوية ولا يمكن تعديلها مرة أخرى
                        </div>
                    ` : ''}
                    <div class="flex justify-end gap-2 mt-2 flex-wrap">
                        ${renderShipmentContactActions(s)}
                    </div>
                </div>
            `).join('');
            saveRepUiState();
        }

        function getShipmentById(id) {
            return allShipments.find(s => String(s.id) === String(id));
        }

        function getShipmentPhone(shipment, key) {
            return (shipment[key] || '').toString().trim();
        }

        function hasShipmentPhone(shipment, key) {
            return Boolean(getShipmentPhone(shipment, key));
        }

        function renderShipmentContactActions(shipment) {
            const renderField = (key, label) => {
                const val = getShipmentPhone(shipment, key);
                if (!val) return '';
                
                // Clean for WhatsApp (digits/plus only)
                const cleaned = val.split('//')[0].replace(/[^\d+]/g, '').trim();
                const isNumeric = /^\+?\d+$/.test(cleaned) && cleaned.length >= 7;

                if (!isNumeric) {
                    return `
                        <div class="flex-1 flex items-center justify-center p-2 bg-slate-100 rounded-xl border border-slate-200">
                            <span class="text-[10px] font-black text-slate-600 text-center leading-tight">${val}</span>
                        </div>
                    `;
                }

                return `
                    <div class="flex gap-2">
                        <button onclick="sendWhatsApp('${shipment.id}', '${key}')" class="w-11 h-11 rounded-full bg-[#25D366] text-white shadow-sm active:scale-95 transition-all flex items-center justify-center" title="واتساب ${label}">
                            <i class="fab fa-whatsapp text-lg"></i>
                        </button>
                        <a href="tel:${cleaned}" class="w-11 h-11 rounded-full bg-white border border-slate-200 text-indigo-600 shadow-sm active:scale-95 transition-all flex items-center justify-center" title="اتصال ${label}">
                            <i class="fas fa-phone-alt"></i>
                        </a>
                    </div>
                `;
            };

            const primary = renderField('الهاتف', 'الهاتف');
            const secondary = renderField('هاتف_بديل', 'الهاتف البديل');

            return `
                <div class="flex flex-wrap items-center justify-center gap-3 w-full">
                    ${primary}
                    ${secondary}
                </div>
            `;
        }

        function formatShipmentCopyText(shipment) {
            const getValue = (value) => {
                if (value === null || value === undefined || value === '') return '---';
                return String(value);
            };

            return [
                `اسم العميل: ${getValue(shipment.اسم_العميل)}`,
                `العنوان: ${getValue(shipment.العنوان)}`,
                `الزون: ${getValue(shipment.الزون)}`,
                `المنتج: ${getValue(shipment.المنتج)}`,
                `الهاتف: ${getValue(shipment.الهاتف)}`,
                `هاتف بديل: ${getValue(shipment.هاتف_بديل)}`,
                `المبلغ: ${getValue(shipment.المبلغ)}`,
                `الكود: ${getValue(shipment.الكود)}`,
                `الراسل: ${getValue(shipment.الراسل)}`,
                `المندوب: ${getValue(shipment.المندوب)}`
            ].join('\n');
        }

        function closeShipmentMenu() {
            const menu = document.getElementById('shipmentMenu');
            menu.classList.add('hidden');
            activeShipmentMenuId = null;
        }

        function toggleShipmentMenu(event, shipmentId) {
            event.stopPropagation();
            const menu = document.getElementById('shipmentMenu');
            const isOpenForSameShipment = activeShipmentMenuId === shipmentId && !menu.classList.contains('hidden');

            if (isOpenForSameShipment) {
                closeShipmentMenu();
                return;
            }

            activeShipmentMenuId = shipmentId;
            menu.classList.remove('hidden');

            const menuWidth = 220;
            const menuHeight = 64;
            const left = Math.max(12, Math.min(event.clientX - menuWidth + 20, window.innerWidth - menuWidth - 12));
            const top = Math.max(12, Math.min(event.clientY + 12, window.innerHeight - menuHeight - 12));

            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
        }

        async function copyShipmentData(id) {
            const shipment = getShipmentById(id);
            if (!shipment) return;

            try {
                await navigator.clipboard.writeText(formatShipmentCopyText(shipment));
                closeShipmentMenu();
                Swal.fire({
                    icon: 'success',
                    title: 'تم نسخ بيانات الشحنة',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 1800
                });
            } catch (error) {
                closeShipmentMenu();
                Swal.fire('خطأ', 'فشل نسخ بيانات الشحنة', 'error');
            }
        }

        function copyShipmentDataFromMenu() {
            if (!activeShipmentMenuId) return;
            copyShipmentData(activeShipmentMenuId);
        }

        function getStatusColor(shipment) {
            if (isPriceEditShipment(shipment)) return 'bg-cyan-500';
            if (isDelayedStatus(shipment.الحالة)) return 'bg-amber-500';
            if (isRejectedStatus(shipment.الحالة)) return 'bg-rose-500';
            switch(shipment.الحالة) {
                case 'تم':
                case 'شحن':
                case 'تم التسليم': return 'bg-emerald-500';
                default: return 'bg-indigo-500';
            }
        }

        function getStatusBadgeClass(shipment) {
            if (isPriceEditShipment(shipment)) return 'bg-cyan-100 text-cyan-700';
            if (isDelayedStatus(shipment.الحالة)) return 'bg-amber-100 text-amber-700';
            if (isRejectedStatus(shipment.الحالة)) return 'bg-rose-100 text-rose-700';
            switch(shipment.الحالة) {
                case 'تم':
                case 'شحن':
                case 'تم التسليم': return 'bg-emerald-100 text-emerald-700';
                default: return 'bg-indigo-100 text-indigo-700';
            }
        }

        async function updateStatus(id, status) {
            if (isShipmentLocked(id)) {
                Swal.fire('تنبيه', 'هذه الشحنة مرتبطة بطلب تسوية ولا يمكن تعديلها مرة أخرى', 'warning');
                return;
            }

            const shipment = allShipments.find(s => s.id == id);
            if (!shipment) return;

            const normalizedStatus = status === 'تم التسليم' ? 'تم' : (status === 'تأجيل' ? 'مؤجل' : status);
            const updatePayload = {
                الحالة: normalizedStatus
            };

            if (normalizedStatus === 'تم') {
                updatePayload.السعر_بعد_التعديل = Number(getShipmentAmount(shipment)) || 0;
            }

            const { error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .update(updatePayload)
                .eq('id', Number(id) || id);

            if (error) {
                console.error('Update shipment status error:', error);
                Swal.fire('خطأ', error.message || 'فشل تحديث الحالة', 'error');
                return;
            }

            Swal.fire({
                icon: 'success',
                title: 'تم التحديث',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000
            });

            // Local update for smoothness
            const index = allShipments.findIndex(s => s.id == id);
            if (index !== -1) {
                allShipments[index].الحالة = normalizedStatus;
                if (Object.prototype.hasOwnProperty.call(updatePayload, 'السعر_بعد_التعديل')) {
                    allShipments[index].السعر_بعد_التعديل = updatePayload.السعر_بعد_التعديل;
                }
            }
            updateFilterCounters();
            renderShipments();
        }

        async function editPrice(id) {
            const shipment = allShipments.find(s => s.id == id);
            if (!shipment) return;
            if (isShipmentLocked(id)) {
                Swal.fire('تنبيه', 'هذه الشحنة مرتبطة بطلب تسوية ولا يمكن تعديلها مرة أخرى', 'warning');
                return;
            }

            const { value: newPrice } = await Swal.fire({
                title: 'تعديل سعر الشحنة',
                input: 'number',
                inputLabel: 'أدخل السعر الجديد',
                inputValue: shipment.السعر_بعد_التعديل || shipment.المبلغ || '',
                inputAttributes: {
                    min: '0',
                    step: '0.01'
                },
                showCancelButton: true,
                confirmButtonText: 'حفظ',
                cancelButtonText: 'إلغاء',
                inputValidator: (value) => {
                    if (value === '' || value === null) return 'يرجى إدخال السعر الجديد';
                    if (Number(value) < 0) return 'السعر يجب أن يكون أكبر من أو يساوي صفر';
                    return null;
                }
            });

            if (newPrice === undefined) return;

            const normalizedPrice = Number(newPrice);
            const { error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .update({
                    الحالة: 'تعديل سعر',
                    السعر_بعد_التعديل: normalizedPrice
                })
                .eq('id', Number(id) || id);

            if (error) {
                console.error('Edit shipment price error:', error);
                Swal.fire('خطأ', error.message || 'فشل تعديل السعر', 'error');
                return;
            }

            const index = allShipments.findIndex(s => s.id == id);
            if (index !== -1) {
                allShipments[index].الحالة = 'تعديل سعر';
                allShipments[index].السعر_بعد_التعديل = normalizedPrice;
            }

            Swal.fire({
                icon: 'success',
                title: 'تم تعديل السعر',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000
            });

            updateFilterCounters();
            renderShipments();
        }

        function sendWhatsApp(id, phoneKey = 'الهاتف') {
            const s = allShipments.find(x => x.id == id);
            if (!s) return;

            let phone = getShipmentPhone(s, phoneKey).split('//')[0].replace(/[^\d+]/g, '').trim();
            if (!phone) {
                Swal.fire('تنبيه', 'لا يوجد رقم هاتف صالح', 'warning');
                return;
            }
            if (phone.startsWith('0')) phone = '2' + phone;

            const text = `السلام عليكم يا فندم معاك مندوب شركة شحن لتوصيل أوردر لحضرتك:
📦 رقم الأوردر: #${s.order_id || '---'}
👤 العميل: ${s.اسم_العميل || '---'}
📍 العنوان: ${s.العنوان || '---'}
🗺️ المنطقة: ${s.الزون || '---'}
📦 المنتج: ${s.المنتج || s.المنتجات || '---'}
📱 التليفون: ${s.الهاتف || '---'}
📱 رقم بديل: ${s.هاتف_بديل || '---'}
💰 المبلغ: ${s.السعر_بعد_التعديل || s.المبلغ || 0}
🏢 الراسل: ${s.الراسل || '---'}

*برجاء الاستعداد لاستلامه*`;

            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }

        function setFilter(filter) {
            currentFilter = filter;
            syncFilterButtons(filter);
            renderShipments();
            saveRepUiState();
        }

        document.getElementById('searchInput').addEventListener('input', () => {
            renderShipments();
            saveRepUiState();
        });
        document.addEventListener('click', (event) => {
            const menu = document.getElementById('shipmentMenu');
            if (menu && !menu.contains(event.target)) {
                closeShipmentMenu();
            }
            const dateBtn = document.getElementById('filterDateBtn');
            const dateMenu = document.getElementById('filterDateMenu');
            const zoneBtn = document.getElementById('filterZoneBtn');
            const zoneMenu = document.getElementById('filterZoneMenu');
            const senderBtn = document.getElementById('filterSenderBtn');
            const senderMenu = document.getElementById('filterSenderMenu');

            if (dateBtn && dateMenu && !dateBtn.contains(event.target) && !dateMenu.contains(event.target)) {
                dateMenu.classList.add('hidden');
            }
            if (zoneBtn && zoneMenu && !zoneBtn.contains(event.target) && !zoneMenu.contains(event.target)) {
                zoneMenu.classList.add('hidden');
            }
            if (senderBtn && senderMenu && !senderBtn.contains(event.target) && !senderMenu.contains(event.target)) {
                senderMenu.classList.add('hidden');
            }
        });
        window.addEventListener('resize', closeShipmentMenu);
        window.addEventListener('scroll', closeShipmentMenu);

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const isDark = body.classList.toggle('dark');
            
            icon.className = isDark ? 'fas fa-sun text-xl' : 'fas fa-moon text-xl';
            localStorage.setItem('rep-theme', isDark ? 'dark' : 'light');
        }

        // Apply theme on load
        if (localStorage.getItem('rep-theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeIcon').className = 'fas fa-sun text-xl';
        }

        // Real-time listener
        const channel = supabaseClient
            .channel('public:shipments1')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'shipments1' }, payload => {
                triggerDateFilterGlow();
                fetchShipments();
            })
            .subscribe();

        supabaseClient
            .channel('public:settlements_rep_lock')
            .on('postgres_changes', { event: '*', schema: 'public', table: CONFIG.TABLES.SETTLEMENTS }, payload => {
                triggerDateFilterGlow();
                fetchShipments();
            })
            .subscribe();

        fetchShipments();
        initUnreadBadge();
    </script>
</body>
</html>
