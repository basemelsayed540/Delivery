<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحساب | نظام الشحن الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-indigo-50/50 dark:bg-slate-950 min-h-screen transition-colors duration-300">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 px-4 py-4 mb-6">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-user-cog"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-800 dark:text-white">إعدادات الحساب</h1>
                    <p class="text-xs font-bold text-indigo-600" id="repName">مندوب توصيل</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                    <i id="themeIcon" class="fas fa-moon text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-24 space-y-6">
        
        <!-- Profile Info -->
        <div class="glass p-6 rounded-3xl space-y-4">
            <h2 class="font-bold text-slate-800 dark:text-white flex items-center gap-2 mb-4">
                <i class="fas fa-id-card text-indigo-600"></i>
                البيانات الشخصية
            </h2>
            
            <div class="bg-white/50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
                <p class="text-xs text-slate-500 mb-1 font-bold">الاسم</p>
                <p class="text-sm font-black text-slate-800 dark:text-white" id="profileName">---</p>
            </div>
            
            <div class="bg-white/50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
                <p class="text-xs text-slate-500 mb-1 font-bold">رقم الهاتف</p>
                <p class="text-sm font-black text-slate-800 dark:text-white" id="profilePhone" dir="ltr" style="text-align: right;">---</p>
            </div>
        </div>
        
        <!-- Change Password -->
        <div class="glass p-6 rounded-3xl space-y-4">
            <h2 class="font-bold text-slate-800 dark:text-white flex items-center gap-2 mb-4">
                <i class="fas fa-lock text-indigo-600"></i>
                تغيير كلمة المرور
            </h2>
            
            <form id="changePasswordForm" class="space-y-4" onsubmit="changePassword(event)">
                <div>
                    <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">كلمة المرور الحالية</label>
                    <div class="relative">
                        <i class="fas fa-key absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                        <input type="password" id="oldPassword" required class="input-field pr-12 text-sm font-semibold shadow-sm w-full" placeholder="أدخل كلمة المرور الحالية">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">كلمة المرور الجديدة</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                        <input type="password" id="newPassword" required class="input-field pr-12 text-sm font-semibold shadow-sm w-full" placeholder="أدخل كلمة المرور الجديدة">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">تأكيد كلمة المرور الجديدة</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                        <input type="password" id="confirmPassword" required class="input-field pr-12 text-sm font-semibold shadow-sm w-full" placeholder="تأكيد كلمة المرور الجديدة">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" id="submitBtn" class="w-full btn-primary py-3">
                        حفظ كلمة المرور
                    </button>
                </div>
            </form>
        </div>

        <div class="pt-4">
            <button onclick="logout()" class="w-full bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 hover:bg-rose-100 transition-colors font-bold py-4 rounded-2xl shadow-sm flex items-center justify-center gap-2 border border-rose-200 dark:border-rose-800">
                <i class="fas fa-sign-out-alt"></i>
                تسجيل الخروج
            </button>
        </div>
        
    </main>

    <!-- Navigation Bottom (Mobile Only) -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-full px-8 py-4 flex items-center justify-between shadow-2xl z-50">
        <a href="rep.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fas fa-box text-xl"></i>
            <span class="text-[10px] font-bold">شحناتي</span>
        </a>
        <a href="map.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fas fa-map-marked-alt text-xl"></i>
            <span class="text-[10px] font-bold">الخريطة</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">المحفظة</span>
        </a>
        <button class="flex flex-col items-center gap-1 text-indigo-600">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-bold">الحساب</span>
        </button>
    </nav>

    <script src="js/config.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'rep') {
            window.location.href = 'index.html';
        }

        document.getElementById('repName').innerText = user.full_name || user.username || user.phone;
        document.getElementById('profileName').innerText = user.full_name || user.username || 'مندوب';
        document.getElementById('profilePhone').innerText = user.phone || 'غير مسجل';

        async function changePassword(e) {
            e.preventDefault();
            
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            if (newPass !== confirmPass) {
                Swal.fire('خطأ', 'كلمة المرور الجديدة غير متطابقة', 'error');
                return;
            }

            if(newPass.length < 4) {
                 Swal.fire('تنبيه', 'كلمة المرور يجب أن تكون 4 أحرف على الأقل', 'warning');
                 return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

            try {
                // 1. Verify old password
                const { data: userData, error: fetchError } = await supabaseClient
                    .from(CONFIG.TABLES.USERS)
                    .select('*')
                    .eq('phone', user.phone)
                    .eq('password', oldPass)
                    .single();

                if (fetchError || !userData) {
                    Swal.fire('خطأ', 'كلمة المرور الحالية غير صحيحة', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'حفظ كلمة المرور';
                    return;
                }

                // 2. Update to new password
                const { error: updateError } = await supabaseClient
                    .from(CONFIG.TABLES.USERS)
                    .update({ password: newPass })
                    .eq('id', userData.id);

                if (updateError) {
                    Swal.fire('خطأ', 'فشل في تحديث كلمة المرور', 'error');
                } else {
                    Swal.fire('تم بنجاح', 'تم تغيير كلمة المرور، يرجى تسجيل الدخول مجدداً', 'success').then(() => {
                        logout();
                    });
                }

            } catch (err) {
                console.error(err);
                Swal.fire('خطأ', 'حدث خطأ غير متوقع', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = 'حفظ كلمة المرور';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const isDark = body.classList.toggle('dark');
            
            icon.className = isDark ? 'fas fa-sun text-xl' : 'fas fa-moon text-xl';
            localStorage.setItem('rep-theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('rep-theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeIcon').className = 'fas fa-sun text-xl';
        }
    </script>
</body>
</html>
