<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحفظة | نظام الشحن الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    </style>
</head>
<body class="bg-indigo-50/50 dark:bg-slate-950 min-h-screen transition-colors duration-300">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 px-4 py-4 mb-6">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-wallet"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-800 dark:text-white">المحفظة</h1>
                    <p class="text-xs font-bold text-indigo-600" id="repName">مندوب توصيل</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                    <i id="themeIcon" class="fas fa-moon text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-24">
        
        <div class="glass p-6 rounded-3xl space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">تصفية حسب تاريخ التحديث</label>
                <div class="relative">
                    <button id="filterDateBtn" onclick="document.getElementById('filterDateMenu').classList.toggle('hidden');" class="w-full glass px-4 py-3 rounded-xl text-sm font-bold text-slate-600 dark:text-white outline-none border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-center flex items-center justify-between transition-all duration-300">
                        <span id="filterDateLabel" class="truncate">اختر تاريخ التحديث</span>
                        <i class="fas fa-chevron-down text-xs opacity-60"></i>
                    </button>
                    <div id="filterDateMenu" class="hidden absolute top-full right-0 mt-1 w-full glass rounded-xl shadow-lg border border-slate-200 dark:bg-slate-800 dark:border-slate-700 max-h-48 overflow-y-auto z-[60] p-2 flex flex-col gap-1 text-right text-xs"></div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-800/50 text-center">
                    <p class="text-xs font-black text-indigo-600 dark:text-indigo-400 mb-2">إجمالي الشحنات</p>
                    <h4 id="walletTotalCount" class="text-3xl font-black text-slate-800 dark:text-white">0</h4>
                </div>
                <div class="bg-emerald-50 dark:bg-emerald-900/30 p-4 rounded-2xl border border-emerald-100 dark:border-emerald-800/50 text-center">
                    <p class="text-xs font-black text-emerald-600 dark:text-emerald-400 mb-2">تم</p>
                    <h4 id="walletDeliveredCount" class="text-3xl font-black text-slate-800 dark:text-white">0</h4>
                </div>
                <div class="bg-cyan-50 dark:bg-cyan-900/30 p-4 rounded-2xl border border-cyan-100 dark:border-cyan-800/50 text-center">
                    <p class="text-xs font-black text-cyan-600 dark:text-cyan-400 mb-2">تعديل سعر</p>
                    <h4 id="walletPriceEditedCount" class="text-3xl font-black text-slate-800 dark:text-white">0</h4>
                </div>
                <div class="bg-rose-50 dark:bg-rose-900/30 p-4 rounded-2xl border border-rose-100 dark:border-rose-800/50 text-center">
                    <p class="text-xs font-black text-rose-600 dark:text-rose-400 mb-2">رفض</p>
                    <h4 id="walletRejectedCount" class="text-3xl font-black text-slate-800 dark:text-white">0</h4>
                </div>
                <div class="bg-sky-50 dark:bg-sky-900/30 p-4 rounded-2xl border border-sky-100 dark:border-sky-800/50 text-center">
                    <p class="text-xs font-black text-sky-600 dark:text-sky-400 mb-2">شحن</p>
                    <h4 id="walletShippingCount" class="text-3xl font-black text-slate-800 dark:text-white">0</h4>
                    <p id="walletShippingAmount" class="mt-1 text-xs font-bold text-slate-600 dark:text-slate-300">0 ج.م</p>
                </div>
                <div class="bg-amber-50 dark:bg-amber-900/30 p-4 rounded-2xl border border-amber-100 dark:border-amber-800/50 text-center">
                    <p class="text-xs font-black text-amber-600 dark:text-amber-400 mb-2">قيد التوصيل</p>
                    <h4 id="walletInTransitCount" class="text-3xl font-black text-slate-800 dark:text-white">0</h4>
                </div>
                <div class="bg-violet-50 dark:bg-violet-900/30 p-4 rounded-2xl border border-violet-100 dark:border-violet-800/50 text-center">
                    <p class="text-xs font-black text-violet-600 dark:text-violet-400 mb-2">مؤجل</p>
                    <h4 id="walletDelayedCount" class="text-3xl font-black text-slate-800 dark:text-white">0</h4>
                </div>
                <div class="bg-emerald-50 dark:bg-emerald-900/30 p-4 rounded-2xl border border-emerald-100 dark:border-emerald-800/50 text-center">
                    <p class="text-xs font-black text-emerald-600 dark:text-emerald-400 mb-2">إجمالي التحصيل</p>
                    <h4 id="walletTotalMoney" class="text-2xl font-black text-slate-800 dark:text-white truncate">0 <span class="text-xs">ج.م</span></h4>
                </div>
                <div class="bg-teal-50 dark:bg-teal-900/30 p-4 rounded-2xl border border-teal-100 dark:border-teal-800/50 text-center">
                    <p class="text-xs font-black text-teal-600 dark:text-teal-400 mb-2">عمولة المندوب</p>
                    <h4 id="walletCommissionTotal" class="text-2xl font-black text-slate-800 dark:text-white truncate">0 <span class="text-xs">ج.م</span></h4>
                </div>
            </div>

            <div class="mt-4">
                <button id="requestSettlementBtn" onclick="requestSettlement()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-hand-holding-usd text-xl"></i>
                    طلب تسوية / حساب
                </button>
            </div>
        </div>
    </main>

    <!-- Navigation Bottom (Mobile Only) -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-full px-8 py-4 flex items-center justify-between shadow-2xl z-50">
        <a href="rep.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fas fa-box text-xl"></i>
            <span class="text-[10px] font-bold">شحناتي</span>
        </a>

        <button class="flex flex-col items-center gap-1 text-indigo-600">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">المحفظة</span>
        </button>
        <a href="account.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-bold">الحساب</span>
        </a>
    </nav>

    <script src="js/config.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'rep') {
            window.location.href = 'index.html';
        }

        document.getElementById('repName').innerText = user.full_name || user.username || user.phone;

        let allShipments = [];
        const WALLET_UI_STATE_KEY = 'walletUiState';
        let dateFilterSelections = new Set();

        function getSelectedDates() {
            return Array.from(dateFilterSelections);
        }

        function toggleDateSelection(value) {
            const normalizedValue = String(value || '').trim();
            if (!normalizedValue) return;

            if (dateFilterSelections.has(normalizedValue)) dateFilterSelections.delete(normalizedValue);
            else dateFilterSelections.add(normalizedValue);
            
            saveDateFilter(getSelectedDates()[0] || '');
            saveWalletUiState();
            updateWalletStats();
        }

        function saveWalletUiState() {
            localStorage.setItem(WALLET_UI_STATE_KEY, JSON.stringify({
                date: getSelectedDates()
            }));
        }

        function saveDateFilter(date) {
            localStorage.setItem('global-selected-abydet', date);
        }

        function getSavedDateFilter() {
            return localStorage.getItem('global-selected-abydet') || '';
        }

        function restoreWalletUiState() {
            let state = null;
            try {
                const raw = localStorage.getItem(WALLET_UI_STATE_KEY);
                state = JSON.parse(raw || 'null');
            } catch (error) {}

            if (state && state.date) {
                const dates = Array.isArray(state.date) ? state.date : [state.date];
                dates.map(d => String(d || '').trim()).filter(Boolean).forEach(d => dateFilterSelections.add(d));
            } else {
                const legacyDate = getSavedDateFilter();
                const normalizedLegacyDate = String(legacyDate || '').trim();
                if (normalizedLegacyDate) dateFilterSelections.add(normalizedLegacyDate);
            }
        }

        async function fetchShipments() {
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .select('*')
                .eq('المندوب', user.username || user.phone)
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            allShipments = data;
            populateDates();
            restoreWalletUiState();
            updateWalletStats();
        }

        function populateDates() {
            const dates = [...new Set(allShipments.map(s => s.الابيديت).filter(Boolean))].sort().reverse();
            
            const datesSet = new Set(dates);
            const normalizedSelectedDates = getSelectedDates().filter(date => datesSet.has(date));
            
            if (normalizedSelectedDates.length !== dateFilterSelections.size) {
                dateFilterSelections = new Set(normalizedSelectedDates);
                saveDateFilter(normalizedSelectedDates[0] || '');
                saveWalletUiState();
            }

            fillDateDropdown(dates);
        }

        function fillDateDropdown(items) {
            const menu = document.getElementById('filterDateMenu');
            const label = document.getElementById('filterDateLabel');
            if (!menu || !label) return;
            
            const selectedArr = getSelectedDates();
            const filterBtn = document.getElementById('filterDateBtn');
            
            if (selectedArr.length > 0) {
                label.innerText = selectedArr.join(' - ');
                filterBtn?.classList.add('!bg-indigo-600', '!text-white', '!border-indigo-600');
                filterBtn?.classList.remove('bg-white', 'text-slate-600', 'dark:bg-slate-800', 'dark:text-white');
            } else {
                label.innerText = 'اختر تاريخ التحديث';
                filterBtn?.classList.remove('!bg-indigo-600', '!text-white', '!border-indigo-600');
                filterBtn?.classList.add('bg-white', 'text-slate-600', 'dark:bg-slate-800', 'dark:text-white');
            }

            if (!items || items.length === 0) {
                menu.innerHTML = `
                    <div class="px-2 py-3 text-center text-[11px] font-bold text-slate-500 dark:text-slate-300">
                        لا يوجد ابيديت متاح
                    </div>
                `;
                return;
            }

            const dateCounts = {};
            allShipments.forEach(s => {
                const d = s.الابيديت;
                if (d) dateCounts[d] = (dateCounts[d] || 0) + 1;
            });

            menu.innerHTML = items.map(item => {
                const isSelected = dateFilterSelections.has(item);
                const count = dateCounts[item] || 0;
                return `
                    <label class="flex items-center justify-between gap-2 p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" onclick="event.stopPropagation()">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange='toggleDateSelection(${JSON.stringify(item)})' class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300">
                            <span class="text-slate-700 dark:text-slate-200 font-bold">${item}</span>
                        </div>
                        <span class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full font-black">${count}</span>
                    </label>
                `;
            }).join('');
        }

        let currentWalletBalance = 0;
        let pendingOrderIds = [];
        let currentSettlementDate = '';

        function isPriceEditShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            const normalizedReason = String(shipment?.['سبب الحالة'] || shipment?.سبب_الحالة || '').trim();
            // شحن is a separate category, NOT price edit
            return normalizedStatus === 'تعديل سعر' || normalizedReason === 'تعديل سعر';
        }

        function isShippingFeeShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            const normalizedReason = String(shipment?.['سبب الحالة'] || shipment?.سبب_الحالة || '').trim();
            return normalizedStatus === 'شحن' || normalizedReason.includes('شحن');
        }

        function isDeliveredShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            return (normalizedStatus === 'تم' || normalizedStatus === 'تم التسليم') && !isPriceEditShipment(shipment) && !isShippingFeeShipment(shipment);
        }

        function isRejectedShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            return normalizedStatus === 'رفض' || normalizedStatus === 'الغاء' || normalizedStatus === 'إلغاء';
        }

        function isDelayedShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            return normalizedStatus === 'تأجيل' || normalizedStatus === 'مؤجل';
        }

        function isPendingShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            return normalizedStatus === '' || normalizedStatus === 'قيد' || normalizedStatus === 'قيد التنفيذ' || normalizedStatus === 'قيد التوصيل';
        }

        function getShippingFeeFromReason(shipment) {
            // Extract numeric shipping fee from سبب_الحالة, e.g. "شحن 50" → 50
            const reason = String(shipment?.['سبب الحالة'] || shipment?.سبب_الحالة || '').trim();
            if (!reason.includes('شحن')) return 0;
            const match = reason.match(/[\d]+(?:[.,][\d]+)?/);
            if (match) {
                const val = parseFloat(match[0].replace(',', '.'));
                return isNaN(val) ? 0 : val;
            }
            return 0;
        }

        function getShipmentCommission(shipment) {
            const value = parseFloat(shipment?.['عمولة المندوب'] || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function getShipmentAmount(shipment) {
            const value = parseFloat(shipment?.السعر_بعد_التعديل || shipment?.المبلغ || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function getAdjustedShipmentAmount(shipment) {
            const value = parseFloat(shipment?.السعر_بعد_التعديل || 0);
            return Number.isNaN(value) ? 0 : value;
        }

        function isCommissionEligibleShipment(shipment) {
            const normalizedStatus = String(shipment?.الحالة || '').trim();
            // 'تم' = delivered, isPriceEditShipment = 'تعديل سعر', isShippingFeeShipment = 'شحن'
            return normalizedStatus === 'تم' || normalizedStatus === 'تم التسليم' || isPriceEditShipment(shipment) || isShippingFeeShipment(shipment);
        }

        async function fetchSettlements() {
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SETTLEMENTS)
                .select('order_ids')
                .eq('rep_name', user.username || user.phone);
                
            let settledIds = new Set();
            if (data) {
                 data.forEach(row => {
                     try {
                         let ids = JSON.parse(row.order_ids);
                         ids.forEach(id => settledIds.add(id));
                     } catch(e) {}
                 });
            }
            return settledIds;
        }

        async function updateWalletStats() {
            const selectedDates = getSelectedDates();
            currentSettlementDate = selectedDates.join(', ');
            if (selectedDates.length === 0) {
                pendingOrderIds = [];
                currentWalletBalance = 0;
                document.getElementById('walletTotalCount').innerText = 0;
                document.getElementById('walletDeliveredCount').innerText = 0;
                document.getElementById('walletPriceEditedCount').innerText = 0;
                document.getElementById('walletRejectedCount').innerText = 0;
                document.getElementById('walletShippingCount').innerText = 0;
                document.getElementById('walletShippingAmount').innerText = `0 ج.م`;
                document.getElementById('walletShippingFeeAmount') && (document.getElementById('walletShippingFeeAmount').innerText = `0 ج.م`);
                document.getElementById('walletInTransitCount').innerText = 0;
                document.getElementById('walletDelayedCount').innerText = 0;
                document.getElementById('walletTotalMoney').innerHTML = `0 <span class="text-xs">ج.م</span>`;
                document.getElementById('walletCommissionTotal').innerHTML = `0 <span class="text-xs text-slate-800 dark:text-white">ج.م</span>`;
                document.getElementById('requestSettlementBtn').disabled = true;
                populateDates();
                saveWalletUiState();
                return;
            }

            let filteredByDate = allShipments.filter(s => selectedDates.includes(s.الابيديت));

            const deliveredCount = filteredByDate.filter(s => isDeliveredShipment(s)).length;
            const priceEditedCount = filteredByDate.filter(s => isPriceEditShipment(s)).length;
            const rejectedCount = filteredByDate.filter(s => isRejectedShipment(s)).length;
            const shippingShipments = filteredByDate.filter(s => isShippingFeeShipment(s));
            const inTransitCount = filteredByDate.filter(s => isPendingShipment(s)).length;
            let filtered = filteredByDate.filter(s => isCommissionEligibleShipment(s));

            const settledIds = await fetchSettlements();
            const unrequested = filtered.filter(s => !settledIds.has(s.id));

            pendingOrderIds = unrequested.map(s => s.id);
            currentWalletBalance = unrequested.reduce((acc, shipment) => acc + getAdjustedShipmentAmount(shipment), 0);
            const currentCommissionTotal = filteredByDate
                .filter(isCommissionEligibleShipment)
                .reduce((acc, shipment) => acc + getShipmentCommission(shipment), 0);
            // Sum numeric shipping fee values extracted from سبب_الحالة (e.g. "شحن 50" → 50)
            const shippingFeeFromReason = shippingShipments.reduce((acc, s) => acc + getShippingFeeFromReason(s), 0);
            const shippingAmount = shippingShipments.reduce((acc, shipment) => acc + getShipmentAmount(shipment), 0);

            document.getElementById('walletTotalCount').innerText = filteredByDate.length;
            document.getElementById('walletDeliveredCount').innerText = deliveredCount;
            document.getElementById('walletPriceEditedCount').innerText = priceEditedCount;
            document.getElementById('walletRejectedCount').innerText = rejectedCount;
            document.getElementById('walletDelayedCount').innerText = filteredByDate.filter(s => isDelayedShipment(s)).length;
            document.getElementById('walletShippingCount').innerText = shippingShipments.length;
            // Show shipping fee from سبب_الحالة if available, otherwise fall back to total amount
            const shippingDisplayValue = shippingFeeFromReason > 0 ? shippingFeeFromReason : shippingAmount;
            document.getElementById('walletShippingAmount').innerText = `${shippingDisplayValue} ج.م`;
            document.getElementById('walletInTransitCount').innerText = inTransitCount;
            document.getElementById('walletTotalMoney').innerHTML = `${currentWalletBalance} <span class="text-xs">ج.م</span>`;
            document.getElementById('walletCommissionTotal').innerHTML = `${currentCommissionTotal} <span class="text-xs text-slate-800 dark:text-white">ج.م</span>`;
            document.getElementById('requestSettlementBtn').disabled = (currentWalletBalance <= 0 || pendingOrderIds.length === 0);
            populateDates();
            saveWalletUiState();
        }

        async function requestSettlement() {
            if (currentWalletBalance <= 0 || pendingOrderIds.length === 0) return;

            if (!currentSettlementDate) {
                Swal.fire('تنبيه', 'يرجى اختيار تاريخ التحديث أولاً قبل طلب التسوية.', 'warning');
                return;
            }

            const res = await Swal.fire({
                title: 'تأكيد طلب تسوية / حساب',
                html: `
                    <div class="text-right space-y-3">
                        <p>سيتم إنشاء طلب تسوية للشحنات المرتبطة بتاريخ التحديث: <b>${currentSettlementDate}</b></p>
                        <p>عدد الشحنات التي سيتم منع تعديلها مرة أخرى: <b>${pendingOrderIds.length}</b></p>
                        <p>المبلغ المطلوب للمندوبية: <b>${currentWalletBalance} ج.م</b></p>
                        <p class="text-rose-600 font-bold">تحذير: بعد إرسال الطلب لن تتمكن من تعديل هذه الشحنات مرة أخرى.</p>
                    </div>
                `,
                icon: 'warning',
                input: 'password',
                inputLabel: 'كلمة المرور',
                inputPlaceholder: 'أدخل كلمة المرور لتأكيد الطلب',
                showCancelButton: true,
                confirmButtonText: 'نعم، أرسل الطلب',
                cancelButtonText: 'إلغاء',
                preConfirm: (password) => {
                    if (!password) {
                        Swal.showValidationMessage('يرجى إدخال كلمة المرور');
                        return false;
                    }
                    if (password !== user.password) {
                        Swal.showValidationMessage('كلمة المرور غير صحيحة');
                        return false;
                    }
                    return password;
                }
            });

            if (res.isConfirmed) {
                const repName = String(user.username || user.full_name || user.phone || '').trim();
                const sanitizedOrderIds = [...new Set((pendingOrderIds || []).map(id => String(id)).filter(Boolean))];
                const { error } = await supabaseClient
                    .from(CONFIG.TABLES.SETTLEMENTS)
                    .insert([{
                        rep_name: repName,
                        balance: Number(currentWalletBalance) || 0,
                        order_ids: JSON.stringify(sanitizedOrderIds),
                        status: 'pending'
                    }]);

                if (error) {
                    console.error('Settlement request error:', error);
                    Swal.fire('خطأ', error.message || 'حدث خطأ أثناء إرسال الطلب', 'error');
                } else {
                    Swal.fire('تم بنجاح', 'تم إرسال طلب التسوية للإدارة', 'success');
                    updateWalletStats();
                }
            }
        }

        document.addEventListener('click', (event) => {
            const dateBtn = document.getElementById('filterDateBtn');
            const dateMenu = document.getElementById('filterDateMenu');
            if (dateBtn && dateMenu && !dateBtn.contains(event.target) && !dateMenu.contains(event.target)) {
                dateMenu.classList.add('hidden');
            }
        });

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const isDark = body.classList.toggle('dark');
            
            icon.className = isDark ? 'fas fa-sun text-xl' : 'fas fa-moon text-xl';
            localStorage.setItem('rep-theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('rep-theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeIcon').className = 'fas fa-sun text-xl';
        }

        // Real-time listener
        supabaseClient
            .channel('public:shipments1')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'shipments1' }, payload => {
                fetchShipments();
            })
            .subscribe();

        supabaseClient
            .channel('public:settlements_wallet')
            .on('postgres_changes', { event: '*', schema: 'public', table: CONFIG.TABLES.SETTLEMENTS }, payload => {
                updateWalletStats();
            })
            .subscribe();

        fetchShipments();
    </script>
</body>
