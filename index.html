<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام الشحن الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full animate-fade-in">
        <div class="glass p-8 rounded-[2rem] shadow-2xl relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl"></div>
            
            <div class="text-center mb-8 relative">
                <div class="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-200">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-800 mb-2">مرحباً بك</h1>
                <p class="text-slate-500 font-semibold">سجل دخولك لمتابعة شحناتك</p>
            </div>

            <form id="loginForm" class="space-y-6 relative">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 mr-1">رقم الموبايل</label>
                    <input type="text" id="phone" name="phone" required class="input-field" placeholder="01xxxxxxxxx">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 mr-1">كلمة المرور</label>
                    <input type="password" id="password" name="password" required class="input-field" placeholder="••••••••">
                </div>
                
                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded text-indigo-600 border-slate-300 focus:ring-indigo-500">
                        <span class="text-sm font-semibold text-slate-600 group-hover:text-slate-800 transition-colors">تذكرني</span>
                    </label>
                    <a href="#" class="text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" id="loginBtn" class="w-full btn-primary flex items-center justify-center gap-2 text-lg">
                    <span>تسجيل الدخول</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-slate-500 font-semibold">ليس لديك حساب؟ <a href="#" class="text-indigo-600 font-bold hover:underline">أنشئ حساباً كمنادوب</a></p>
            </div>
        </div>
        
        <p class="text-center mt-8 text-slate-400 font-bold text-sm">© 2026 نظام الشحن المتطور - جميع الحقوق محفوظة</p>
    </div>

    <script src="js/config.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'جاري التحقق...';

            try {
                // Special case for initial Admin
                if (phone === 'admin' && password === 'admin') {
                    localStorage.setItem('user', JSON.stringify({ role: 'admin', phone: 'admin' }));
                    Swal.fire({
                        icon: 'success',
                        title: 'تم تسجيل الدخول بنجاح',
                        text: 'مرحباً أيها المدير',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'admin.html';
                    });
                    return;
                }

                // Query existing users table
                const { data, error } = await supabaseClient
                    .from(CONFIG.TABLES.USERS)
                    .select('*')
                    .eq('phone', phone)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    throw new Error('بيانات الدخول غير صحيحة');
                }

                if (!data.approved) {
                    throw new Error('عذراً، حسابك لم يتم تفعيله بعد من قبل الإدارة');
                }

                // Store session
                localStorage.setItem('user', JSON.stringify(data));

                Swal.fire({
                    icon: 'success',
                    title: 'تم تسجيل الدخول بنجاح',
                    text: `مرحباً بك، ${data.full_name || data.username}`,
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    // Role-based redirection
                    if (data.role === 'admin') window.location.href = 'admin.html';
                    else if (data.role === 'rep') window.location.href = 'rep.html';
                    else if (data.role === 'sender') window.location.href = 'sender.html';
                    else throw new Error('دور المستخدم غير معروف');
                });

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'فشل الدخول',
                    text: err.message
                });
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'تسجيل الدخول';
            }
        });
    </script>
</body>
</html>
