<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الراسل | نظام الشحن الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-indigo-50/30 dark:bg-slate-950 min-h-screen transition-colors duration-300">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl">
                    <i class="fas fa-store text-xl"></i>
                </div>
                <div>
                    <h1 id="senderName" class="text-xl font-black text-slate-800 tracking-tight">جاري التحميل...</h1>
                    <p class="text-xs font-bold text-indigo-600 italic">عميل مميز</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-3 bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-300 hover:text-indigo-500 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 transition-all">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
                <button onclick="logout()" class="p-3 bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-300 hover:text-rose-500 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 transition-all" title="خروج">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 pb-12">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-3xl">
                <p class="text-slate-400 text-sm font-bold mb-1">إجمالي شحناتك</p>
                <h2 id="totalOrders" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="glass p-6 rounded-3xl">
                <p class="text-slate-400 text-sm font-bold mb-1">تم تسليمها</p>
                <h2 id="deliveredOrders" class="text-3xl font-black text-emerald-500">0</h2>
            </div>
            <div class="glass p-6 rounded-3xl">
                <p class="text-slate-400 text-sm font-bold mb-1">قيد التوصيل</p>
                <h2 id="pendingOrders" class="text-3xl font-black text-indigo-500">0</h2>
            </div>
        </div>

        <!-- Tracking Table -->
        <div class="glass rounded-3xl overflow-hidden shadow-xl">
            <div class="p-6 border-b border-slate-100 bg-white/50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h3 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    <i class="fas fa-list-ul text-indigo-500"></i>
                    سجل الشحنات
                </h3>
                <div class="relative w-full md:w-64">
                    <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="orderSearch" placeholder="بحث برقم الأوردر..." class="input-field pr-12 text-xs font-bold shadow-sm">
                </div>
            </div>
            
            <div class="table-container">
                <table class="w-full text-right">
                    <thead class="bg-slate-50/50">
                        <tr class="text-slate-400 text-[11px] font-black uppercase tracking-wider">
                            <th class="p-4">رقم الأوردر</th>
                            <th class="p-4">العميل</th>
                            <th class="p-4">العنوان</th>
                            <th class="p-4">المبلغ</th>
                            <th class="p-4">الحالة</th>
                            <th class="p-4">المندوب</th>
                        </tr>
                    </thead>
                    <tbody id="senderShipmentsTable">
                        <!-- Dynamic rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const SHIPMENT_CODE_FIELD = 'كود الشحنة';
        const SHIPMENT_CODE_FIELD_LEGACY = 'order_id';

        function normalizeShipmentRecord(record) {
            if (!record || typeof record !== 'object') return record;
            const normalized = { ...record };
            const resolvedCodeValue = normalized[SHIPMENT_CODE_FIELD] ?? normalized[SHIPMENT_CODE_FIELD_LEGACY] ?? normalized['كود_الشحنة'] ?? normalized['الكود'];
            if (resolvedCodeValue !== undefined) {
                normalized[SHIPMENT_CODE_FIELD] = resolvedCodeValue;
                normalized[SHIPMENT_CODE_FIELD_LEGACY] = resolvedCodeValue;
                normalized['كود_الشحنة'] = resolvedCodeValue;
            }
            return normalized;
        }

        let user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'sender') {
            window.location.href = 'index.html';
        }

        document.getElementById('senderName').innerText = user.full_name || user.username || user.phone;

        let myShipments = [];
        const SENDER_UI_STATE_KEY = 'senderUiState';

        function saveSenderUiState() {
            try {
                localStorage.setItem(SENDER_UI_STATE_KEY, JSON.stringify({
                    search: document.getElementById('orderSearch')?.value || ''
                }));
            } catch (error) {}
        }

        function restoreSenderUiState() {
            let state = null;
            try {
                state = JSON.parse(localStorage.getItem(SENDER_UI_STATE_KEY) || 'null');
            } catch (error) {
                state = null;
            }

            if (!state) return;
            const search = document.getElementById('orderSearch');
            if (search) search.value = state.search || '';
        }

        function isPendingStatus(status) {
            const normalizedStatus = String(status || '').trim();
            return normalizedStatus === '' || normalizedStatus === 'قيد' || normalizedStatus === 'قيد التنفيذ' || normalizedStatus === 'قيد التوصيل';
        }

        async function fetchMyShipments() {
            const { data, error } = await supabaseClient
                .from(CONFIG.TABLES.SHIPMENTS)
                .select('*')
                .eq('الراسل', user.username || user.phone) // Match sender name/phone
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            myShipments = (data || []).map(normalizeShipmentRecord);
            restoreSenderUiState();
            renderTable();
            updateStats();
        }

        function renderTable() {
            const list = document.getElementById('senderShipmentsTable');
            const search = document.getElementById('orderSearch').value.toLowerCase();
            
            const filtered = myShipments.filter(s => 
                String(s.order_id).toLowerCase().includes(search) || 
                String(s.اسم_العميل).toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                list.innerHTML = '<tr><td colspan="6" class="p-10 text-center opacity-40 font-bold">لا توجد بيانات</td></tr>';
                saveSenderUiState();
                return;
            }

            list.innerHTML = filtered.map(s => `
                <tr class="hover:bg-indigo-50/20 transition-colors border-b border-slate-50 last:border-0">
                    <td class="p-4 text-sm font-black text-slate-800">#${s.order_id}</td>
                    <td class="p-4 text-xs font-bold text-slate-600">${s.اسم_العميل || '---'}</td>
                    <td class="p-4 text-[10px] font-bold text-slate-400 max-w-[150px] truncate">${s.العنوان || '---'}</td>
                    <td class="p-4 text-sm font-black text-indigo-600">${s.المبلغ || 0} ج.م</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-md text-[9px] font-black ${getStatusBadgeClass(s.الحالة)}">
                            ${isPendingStatus(s.الحالة) ? 'قيد التوصيل' : (['الغاء', 'إلغاء', 'رفض'].includes(s.الحالة) ? 'رفض' : s.الحالة)}
                        </span>
                    </td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-[10px] text-slate-500">
                                <i class="fas fa-truck"></i>
                            </div>
                            <span class="text-[10px] font-bold text-slate-500">${s.المندوب || 'غير محدد'}</span>
                        </div>
                    </td>
                </tr>
            `).join('');
            saveSenderUiState();
        }

        function updateStats() {
            document.getElementById('totalOrders').innerText = myShipments.length;
            document.getElementById('deliveredOrders').innerText = myShipments.filter(s => s.الحالة === 'تم التسليم' || s.الحالة === 'تم').length;
            document.getElementById('pendingOrders').innerText = myShipments.filter(s => isPendingStatus(s.الحالة)).length;
        }

        function getStatusBadgeClass(status) {
            switch(status) {
                case 'تم التسليم': return 'bg-emerald-100 text-emerald-700';
                case 'تأجيل': return 'bg-amber-100 text-amber-700';
                case 'رفض':
                case 'الغاء':
                case 'إلغاء': return 'bg-rose-100 text-rose-700';
                default: return 'bg-indigo-100 text-indigo-700';
            }
        }

        document.getElementById('orderSearch').addEventListener('input', () => {
            renderTable();
            saveSenderUiState();
        });

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('rep-theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('rep-theme') === 'dark') {
            document.body.classList.add('dark');
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = 'fas fa-sun';
        }

        // Real-time listener
        supabaseClient
            .channel('sender_changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'shipments1' }, fetchMyShipments)
            .subscribe();

        fetchMyShipments();
    </script>
</body>
</html>
